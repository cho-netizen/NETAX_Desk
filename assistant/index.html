<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>NX Assistant — 이음세무컨설팅</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@500;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --navy-deep:#141d2b;
    --navy-panel:#1b2a41;
    --navy-panel-2:#233a56;
    --navy-line:#2f4562;
    --gold:#c9a227;
    --gold-soft:#e4c866;
    --ink:#e8e6df;
    --ink-dim:#93a0b4;
    --user-bubble:#2e4a6b;
    --assistant-bubble:#22314a;
    --danger:#c9645a;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    background:
      radial-gradient(1200px 600px at 50% -10%, #1c2c44 0%, var(--navy-deep) 55%);
    color:var(--ink);
    font-family:'Noto Sans KR', system-ui, sans-serif;
    display:flex;
    flex-direction:column;
    height:100vh;
    overflow:hidden;
  }

  /* ---------- Header ---------- */
  header{
    flex:0 0 auto;
    padding:18px 24px 14px;
    border-bottom:1px solid var(--navy-line);
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
  }
  .brand{ display:flex; align-items:center; gap:12px; }
  .pulse{
    position:relative;
    width:11px;height:11px;
    border-radius:50%;
    background:var(--gold);
    box-shadow:0 0 0 0 rgba(201,162,39,.55);
    animation:pulse 2.6s ease-out infinite;
    flex:0 0 auto;
  }
  .pulse.busy{animation-duration:.9s;background:var(--gold-soft);}
  @keyframes pulse{
    0%{box-shadow:0 0 0 0 rgba(201,162,39,.55);}
    70%{box-shadow:0 0 0 10px rgba(201,162,39,0);}
    100%{box-shadow:0 0 0 0 rgba(201,162,39,0);}
  }
  .brand-text h1{ font-family:'Noto Serif KR', serif; font-weight:700; font-size:17px; margin:0; letter-spacing:.2px; }
  .brand-text p{ margin:2px 0 0; font-size:11.5px; color:var(--ink-dim); letter-spacing:.3px; }
  .usage-badge{
    font-size:11px; color:var(--ink-dim); letter-spacing:.2px;
    display:flex; gap:10px; white-space:nowrap;
  }
  .usage-badge b{color:var(--gold-soft);font-weight:600;}
  .header-actions{display:flex;gap:8px;align-items:center;}
  .icon-btn{
    background:transparent; border:1px solid var(--navy-line); color:var(--ink-dim);
    border-radius:8px; padding:7px 12px; font-size:12.5px; cursor:pointer; transition:.15s;
    text-decoration:none; display:inline-flex; align-items:center; white-space:nowrap;
  }
  .icon-btn:hover{border-color:var(--gold);color:var(--gold-soft);}

  .settings-panel{
    flex:0 0 auto; max-height:0; overflow:hidden;
    border-bottom:1px solid transparent;
    transition:max-height .22s ease, border-color .22s ease;
  }
  .settings-panel.open{ max-height:480px; border-bottom:1px solid var(--navy-line); }
  .settings-inner{ max-width:780px; margin:0 auto; padding:14px 20px 16px; display:flex; flex-direction:column; gap:12px; max-height:460px; overflow-y:auto; }
  .settings-row label{ font-size:11.5px; color:var(--ink-dim); display:flex; align-items:center; gap:8px; margin-bottom:6px; }
  .settings-label-row{ display:flex; align-items:center; justify-content:space-between; }
  .settings-label-row label{ margin-bottom:0; }
  .mini-btn{
    background:none; border:1px solid var(--navy-line); color:var(--ink-dim);
    font-size:10.5px; padding:3px 8px; border-radius:6px; cursor:pointer; transition:.15s;
  }
  .mini-btn:hover{border-color:var(--gold);color:var(--gold-soft);}
  #systemPromptInput{
    width:100%; resize:vertical; min-height:44px; background:var(--navy-panel-2);
    border:1px solid var(--navy-line); border-radius:8px; color:var(--ink);
    font-family:inherit; font-size:13px; line-height:1.5; padding:8px 10px; outline:none;
  }
  #systemPromptInput:focus{border-color:var(--gold);}
  .settings-row-split{ display:flex; gap:20px; flex-wrap:wrap; }
  .settings-col{ flex:1 1 220px; min-width:200px; }
  .settings-hint{ font-size:10px; color:var(--danger); }
  input[type="range"]{ width:100%; accent-color:var(--gold); }
  input[type="range"]:disabled{ opacity:.35; }
  .text-input{
    width:100%; background:var(--navy-panel-2); border:1px solid var(--navy-line);
    border-radius:8px; color:var(--ink); font-family:inherit; font-size:13px;
    padding:7px 10px; outline:none;
  }
  .text-input:focus{border-color:var(--gold);}
  .toggle-col{ display:flex; align-items:flex-start; }
  .toggle-label{
    display:flex !important; align-items:flex-start; gap:8px; cursor:pointer;
    font-size:12.5px; color:var(--ink); margin-bottom:0 !important;
  }
  .toggle-label input[type="checkbox"]{
    margin-top:2px; accent-color:var(--gold); width:15px;height:15px; cursor:pointer; flex:0 0 auto;
  }
  .toggle-label .settings-hint{ color:var(--ink-dim); font-size:10.5px; display:block; margin-top:2px; }

  /* ---------- Messages ---------- */
  main{ flex:1 1 auto; overflow-y:auto; padding:22px 0 12px; }
  .thread{ max-width:780px; margin:0 auto; padding:0 20px; display:flex; flex-direction:column; gap:16px; }
  .row{display:flex;gap:10px;max-width:100%;}
  .row.user{justify-content:flex-end;}
  .avatar{
    flex:0 0 auto; width:28px;height:28px; border-radius:7px;
    display:flex;align-items:center;justify-content:center;
    font-family:'Noto Serif KR',serif; font-weight:700; font-size:12px;
    background:var(--navy-panel-2); border:1px solid var(--navy-line); color:var(--gold-soft);
  }
  .row.user .avatar{display:none;}
  .bubble-col{display:flex;flex-direction:column;gap:6px;max-width:80%;}
  .row.user .bubble-col{max-width:75%;align-items:flex-end;}
  .bubble{
    padding:11px 15px; border-radius:12px; font-size:14.5px; line-height:1.62;
    white-space:pre-wrap; word-break:break-word;
  }
  .row.assistant .bubble{ background:var(--assistant-bubble); border:1px solid var(--navy-line); border-top-left-radius:3px; }
  .row.user .bubble{ background:var(--user-bubble); border-top-right-radius:3px; }
  .bubble.error{ background:rgba(201,100,90,.12); border:1px solid rgba(201,100,90,.4); color:#e8a49d; }

  .attach-preview{ display:flex; flex-wrap:wrap; gap:6px; }
  .attach-chip{
    display:flex; align-items:center; gap:6px;
    background:var(--navy-panel-2); border:1px solid var(--navy-line);
    border-radius:8px; padding:5px 9px; font-size:12px; color:var(--ink-dim);
    max-width:220px;
  }
  .attach-chip img{ width:20px;height:20px;border-radius:4px;object-fit:cover;flex:0 0 auto; }
  .attach-chip span{ overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

  .typing{ display:flex;gap:4px;align-items:center;padding:4px 2px; }
  .typing span{ width:6px;height:6px;border-radius:50%; background:var(--gold-soft); opacity:.35; animation:blink 1.1s infinite; }
  .typing span:nth-child(2){animation-delay:.15s;}
  .typing span:nth-child(3){animation-delay:.3s;}
  @keyframes blink{0%,60%,100%{opacity:.25;}30%{opacity:.9;}}

  .empty-state{ max-width:520px; margin:12vh auto 0; text-align:center; padding:0 24px; }
  .empty-state .mark{ font-family:'Noto Serif KR',serif; font-size:26px; color:var(--gold); margin-bottom:10px; }
  .empty-state p{ color:var(--ink-dim); font-size:13.5px; line-height:1.7; margin:0; }

  /* ---------- Composer ---------- */
  footer{
    flex:0 0 auto; padding:12px 20px 18px; border-top:1px solid var(--navy-line);
    background:linear-gradient(180deg, rgba(20,29,43,0), var(--navy-deep) 30%);
  }
  .composer-wrap{
    max-width:780px; margin:0 auto;
    background:var(--navy-panel); border:1px solid var(--navy-line); border-radius:14px;
    padding:10px 12px; transition:border-color .15s;
  }
  .composer-wrap:focus-within{border-color:var(--gold);}

  .staged-files{ display:flex; flex-wrap:wrap; gap:6px; padding:0 2px 8px; }
  .staged-chip{
    display:flex; align-items:center; gap:6px;
    background:var(--navy-panel-2); border:1px solid var(--navy-line);
    border-radius:8px; padding:5px 6px 5px 9px; font-size:12px; color:var(--ink-dim);
    max-width:200px;
  }
  .staged-chip img{ width:18px;height:18px;border-radius:4px;object-fit:cover;flex:0 0 auto; }
  .staged-chip .fname{ overflow:hidden;text-overflow:ellipsis;white-space:nowrap; }
  .staged-chip button{
    background:none;border:none;color:var(--ink-dim);cursor:pointer;font-size:14px;line-height:1;
    padding:2px 3px; flex:0 0 auto;
  }
  .staged-chip button:hover{color:var(--danger);}

  .composer-input-row{ display:flex; align-items:flex-end; gap:8px; }
  textarea{
    flex:1; resize:none; background:transparent; border:none; outline:none;
    color:var(--ink); font-family:inherit; font-size:14.5px; line-height:1.55;
    max-height:160px; padding:8px 2px;
  }
  textarea::placeholder{color:var(--ink-dim);}
  .send-btn{
    flex:0 0 auto; width:36px;height:36px; border-radius:10px; border:none;
    background:var(--gold); color:#1b2a41; font-weight:700; cursor:pointer;
    display:flex;align-items:center;justify-content:center; transition:.15s;
  }
  .send-btn:disabled{background:var(--navy-line);color:var(--ink-dim);cursor:not-allowed;}
  .send-btn:not(:disabled):hover{background:var(--gold-soft);}

  .composer-toolbar{
    display:flex; align-items:center; gap:8px; margin-top:6px; padding-top:8px;
    border-top:1px solid var(--navy-line);
  }
  .attach-btn{
    flex:0 0 auto; width:30px;height:30px; border-radius:8px;
    border:1px solid var(--navy-line); background:transparent; color:var(--ink-dim);
    font-size:17px; cursor:pointer; display:flex;align-items:center;justify-content:center;
    transition:.15s;
  }
  .attach-btn:hover{border-color:var(--gold);color:var(--gold-soft);}
  .toolbar-spacer{flex:1;}
  .pill-select{
    appearance:none;-webkit-appearance:none;
    background:var(--navy-panel-2); border:1px solid var(--navy-line); color:var(--ink);
    font-family:inherit; font-size:12px; padding:6px 26px 6px 10px; border-radius:20px;
    cursor:pointer; outline:none;
    background-image:linear-gradient(45deg, transparent 50%, var(--ink-dim) 50%), linear-gradient(135deg, var(--ink-dim) 50%, transparent 50%);
    background-position:calc(100% - 13px) center, calc(100% - 8px) center;
    background-size:5px 5px, 5px 5px; background-repeat:no-repeat;
    transition:.15s;
  }
  .pill-select:hover, .pill-select:focus{border-color:var(--gold);}
  .pill-select option{background:var(--navy-panel);color:var(--ink);}
  .num-input{
    appearance:none;-webkit-appearance:none;background:none;background-color:var(--navy-panel-2);
    border:1px solid var(--navy-line); color:var(--ink); font-family:inherit; font-size:12px;
    padding:6px 10px; border-radius:20px; width:112px; text-align:center; outline:none; transition:.15s;
  }
  .num-input::placeholder{color:var(--ink-dim);}
  .num-input:hover, .num-input:focus{border-color:var(--gold);}

  .hint{ text-align:center; font-size:11px; color:var(--ink-dim); margin-top:8px; letter-spacing:.2px; }

  main::-webkit-scrollbar{width:8px;}
  main::-webkit-scrollbar-thumb{background:var(--navy-line);border-radius:4px;}
</style>
</head>
<body>

<header>
  <div class="brand">
    <span class="pulse" id="pulse"></span>
    <div class="brand-text">
      <h1>NX Assistant</h1>
      <p>이음세무컨설팅 · 개인 업무 창구</p>
    </div>
  </div>
  <div class="header-actions">
    <div class="usage-badge" id="usageBadge" title="예상 비용(캐싱·배치 할인 미반영, 참고용)">
      <span>세션 <b id="sessionCost">$0.0000</b></span>
      <span>오늘 <b id="todayCost">$0.0000</b></span>
    </div>
    <a class="icon-btn" id="consoleLink" href="https://platform.claude.com/workspaces/default/workbench" target="_blank" rel="noopener">Claude Console ↗</a>
    <button class="icon-btn" id="settingsBtn" title="상세 설정(시스템 프롬프트·온도·중지 시퀀스·도구)">⚙ 설정</button>
    <button class="icon-btn" id="resetBtn">새 대화</button>
  </div>
</header>

<div class="settings-panel" id="settingsPanel">
  <div class="settings-inner">
    <div class="settings-row">
      <div class="settings-label-row">
        <label for="systemPromptInput">시스템 프롬프트</label>
        <button class="mini-btn" id="resetSystemPromptBtn">기본값으로 복원</button>
      </div>
      <textarea id="systemPromptInput" rows="2"></textarea>
    </div>
    <div class="settings-row settings-row-split">
      <div class="settings-col">
        <label for="temperatureInput">
          온도(Temperature): <span id="temperatureValue">1.0</span>
          <span class="settings-hint" id="temperatureHint"></span>
        </label>
        <input type="range" id="temperatureInput" min="0" max="1" step="0.1" value="1">
      </div>
      <div class="settings-col">
        <label for="stopSequencesInput">중지 시퀀스 (쉼표로 구분)</label>
        <input type="text" id="stopSequencesInput" class="text-input" placeholder="예: 끝, END">
      </div>
    </div>
    <div class="settings-row settings-row-split">
      <div class="settings-col toggle-col">
        <label class="toggle-label">
          <input type="checkbox" id="webSearchToggle">
          <span>웹 검색 사용 <span class="settings-hint">(건당 $0.01, 콘솔에서 조직 관리자가 먼저 켜둬야 함)</span></span>
        </label>
      </div>
      <div class="settings-col toggle-col">
        <label class="toggle-label">
          <input type="checkbox" id="codeExecToggle">
          <span>코드 실행 사용 <span class="settings-hint" id="codeExecHint">(계산·데이터 처리를 서버에서 대신 실행)</span></span>
        </label>
      </div>
    </div>
    <div class="settings-row settings-row-split">
      <div class="settings-col toggle-col">
        <label class="toggle-label">
          <input type="checkbox" id="webFetchToggle">
          <span>웹 가져오기 사용 <span class="settings-hint">(대화에 등장한 URL·PDF 내용을 직접 읽어옴, 베타)</span></span>
        </label>
      </div>
      <div class="settings-col toggle-col">
        <label class="toggle-label">
          <input type="checkbox" id="advisorToggle">
          <span>어드바이저 사용 <span class="settings-hint" id="advisorHint">(어려운 판단 시 더 강한 모델에게 중간 자문, 베타·추가비용)</span></span>
        </label>
        <select class="pill-select" id="advisorModelSelect" style="margin-top:6px;">
          <option value="claude-opus-4-8">자문 모델: Opus 4.8</option>
          <option value="claude-fable-5">자문 모델: Fable 5</option>
          <option value="claude-sonnet-5">자문 모델: Sonnet 5</option>
        </select>
      </div>
    </div>
  </div>
</div>

<main id="main">
  <div class="thread" id="thread">
    <div class="empty-state" id="emptyState">
      <div class="mark">◆</div>
      <p>무엇을 도와드릴까요?<br>업무 자문, 문서 초안, 이미지·PDF 첨부 분석까지 편하게 물어보세요.</p>
    </div>
  </div>
</main>

<footer>
  <div class="composer-wrap">
    <div class="staged-files" id="stagedFiles"></div>
    <div class="composer-input-row">
      <textarea id="input" rows="1" placeholder="메시지를 입력하세요…"></textarea>
      <button class="send-btn" id="sendBtn" aria-label="전송">↑</button>
    </div>
    <div class="composer-toolbar">
      <button class="attach-btn" id="attachBtn" aria-label="파일 첨부" title="파일 첨부 (이미지 · PDF)">+</button>
      <input type="file" id="fileInput" hidden accept="image/*,application/pdf" multiple>
      <div class="toolbar-spacer"></div>
      <select class="pill-select" id="modelSelect" title="모델 선택">
        <optgroup label="Claude">
          <option value="claude-sonnet-5">Sonnet 5</option>
          <option value="claude-opus-4-8">Opus 4.8</option>
          <option value="claude-haiku-4-5-20251001">Haiku 4.5</option>
          <option value="claude-fable-5">Fable 5</option>
        </optgroup>
        <optgroup label="Gemini">
          <option value="gemini-3.1-pro">Gemini 3.1 Pro</option>
          <option value="gemini-3.5-flash">Gemini 3.5 Flash</option>
          <option value="gemini-3.1-flash-lite">Gemini 3.1 Flash-Lite</option>
        </optgroup>
      </select>
      <select class="pill-select" id="effortSelect" title="사고 노력(익스텐디드 씽킹)">
        <option value="low">노력: 낮음</option>
        <option value="medium" selected>노력: 중간</option>
        <option value="high">노력: 높음</option>
      </select>
      <input type="number" class="num-input" id="maxTokensInput" placeholder="최대토큰: 자동" min="256" max="64000" step="256" title="최대 출력 토큰 (비워두면 노력 단계 기본값 사용)">
    </div>
  </div>
  <div class="hint">Enter 전송 · Shift+Enter 줄바꿈 · 이미지/PDF 첨부 가능(각 10MB, 최대 3개) · 비용은 참고용 추정치입니다</div>
</footer>

<script>
// =====================================================================
// 설정: Apps Script 웹앱 배포 URL을 여기에 넣으세요.
// (Apps Script 편집기 > 배포 > 웹 앱으로 배포 후 발급되는 /exec URL)
// =====================================================================
const ENDPOINT_URL = "https://script.google.com/macros/s/AKfycbz9pam82WMSMKHYo6-6EtEguMbpZ0AaqHirVzwcW6ZFRsdq4WGluvhpPkYUoTE2l_bm/exec";

const MAX_FILES = 3;
const MAX_FILE_MB = 10;

const thread = document.getElementById('thread');
const emptyState = document.getElementById('emptyState');
const input = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');
const pulse = document.getElementById('pulse');
const resetBtn = document.getElementById('resetBtn');
const main = document.getElementById('main');
const attachBtn = document.getElementById('attachBtn');
const fileInput = document.getElementById('fileInput');
const stagedFilesEl = document.getElementById('stagedFiles');
const modelSelect = document.getElementById('modelSelect');
const effortSelect = document.getElementById('effortSelect');
const maxTokensInput = document.getElementById('maxTokensInput');
const sessionCostEl = document.getElementById('sessionCost');
const todayCostEl = document.getElementById('todayCost');
const settingsBtn = document.getElementById('settingsBtn');
const settingsPanel = document.getElementById('settingsPanel');
const systemPromptInput = document.getElementById('systemPromptInput');
const resetSystemPromptBtn = document.getElementById('resetSystemPromptBtn');
const temperatureInput = document.getElementById('temperatureInput');
const temperatureValue = document.getElementById('temperatureValue');
const temperatureHint = document.getElementById('temperatureHint');
const stopSequencesInput = document.getElementById('stopSequencesInput');
const webSearchToggle = document.getElementById('webSearchToggle');
const codeExecToggle = document.getElementById('codeExecToggle');
const codeExecHint = document.getElementById('codeExecHint');

// 코드 실행 도구를 공식 지원하지 않는 모델(2026.07 기준 Haiku 계열)
const NO_CODE_EXEC_MODELS = ['claude-haiku-4-5-20251001'];

webSearchToggle.checked = localStorage.getItem('nxAssistantWebSearch') === '1';
webSearchToggle.addEventListener('change', () => {
  localStorage.setItem('nxAssistantWebSearch', webSearchToggle.checked ? '1' : '0');
});

codeExecToggle.checked = localStorage.getItem('nxAssistantCodeExec') === '1';
codeExecToggle.addEventListener('change', () => {
  localStorage.setItem('nxAssistantCodeExec', codeExecToggle.checked ? '1' : '0');
});

function updateCodeExecAvailability(){
  const blocked = NO_CODE_EXEC_MODELS.includes(modelSelect.value);
  codeExecToggle.disabled = blocked;
  codeExecHint.textContent = blocked
    ? '(이 모델은 코드 실행 도구를 지원하지 않음)'
    : '(계산·데이터 처리를 서버에서 대신 실행)';
}
modelSelect.addEventListener('change', updateCodeExecAvailability);
updateCodeExecAvailability();

const webFetchToggle = document.getElementById('webFetchToggle');
const advisorToggle = document.getElementById('advisorToggle');
const advisorModelSelect = document.getElementById('advisorModelSelect');

webFetchToggle.checked = localStorage.getItem('nxAssistantWebFetch') === '1';
webFetchToggle.addEventListener('change', () => {
  localStorage.setItem('nxAssistantWebFetch', webFetchToggle.checked ? '1' : '0');
});

advisorToggle.checked = localStorage.getItem('nxAssistantAdvisor') === '1';
advisorToggle.addEventListener('change', () => {
  localStorage.setItem('nxAssistantAdvisor', advisorToggle.checked ? '1' : '0');
});

advisorModelSelect.value = localStorage.getItem('nxAssistantAdvisorModel') || 'claude-opus-4-8';
advisorModelSelect.addEventListener('change', () => {
  localStorage.setItem('nxAssistantAdvisorModel', advisorModelSelect.value);
});

const advisorHint = document.getElementById('advisorHint');
function updateAdvisorAvailability(){
  const isGemini = modelSelect.value.startsWith('gemini-');
  advisorToggle.disabled = isGemini;
  advisorHint.textContent = isGemini
    ? '(Gemini 모델에는 대응 기능 없음, Claude 모델에서만 사용 가능)'
    : '(어려운 판단 시 더 강한 모델에게 중간 자문, 베타·추가비용)';
}
modelSelect.addEventListener('change', updateAdvisorAvailability);
updateAdvisorAvailability();

const consoleLink = document.getElementById('consoleLink');
const CLAUDE_CONSOLE_URL = 'https://platform.claude.com/workspaces/default/workbench';
const GEMINI_STUDIO_URL = 'https://aistudio.google.com/prompts/new_chat';
function updateConsoleLink(){
  const isGemini = modelSelect.value.startsWith('gemini-');
  consoleLink.href = isGemini ? GEMINI_STUDIO_URL : CLAUDE_CONSOLE_URL;
  consoleLink.textContent = isGemini ? 'Google AI Studio ↗' : 'Claude Console ↗';
}
modelSelect.addEventListener('change', updateConsoleLink);
updateConsoleLink();

// Apps Script의 기본 시스템 프롬프트와 동일한 문구(사용자가 비워두면 이 값으로 대체됨)
const DEFAULT_SYSTEM_PROMPT = '너는 이음세무컨설팅(조종호 세무사)의 개인 업무 보조 AI다. 실무적이고 정확하게, 간결한 존댓말로 답한다.';
// temperature를 지원하지 않는 모델(적응형 추론 모델은 값 지정 시 오류 발생)
const NO_TEMPERATURE_MODELS = ['claude-sonnet-5', 'claude-opus-4-8', 'claude-fable-5'];

systemPromptInput.value = localStorage.getItem('nxAssistantSystemPrompt') || DEFAULT_SYSTEM_PROMPT;
systemPromptInput.addEventListener('input', () => {
  localStorage.setItem('nxAssistantSystemPrompt', systemPromptInput.value);
});
resetSystemPromptBtn.addEventListener('click', () => {
  systemPromptInput.value = DEFAULT_SYSTEM_PROMPT;
  localStorage.setItem('nxAssistantSystemPrompt', DEFAULT_SYSTEM_PROMPT);
});

temperatureInput.value = localStorage.getItem('nxAssistantTemperature') || '1';
temperatureInput.addEventListener('input', () => {
  temperatureValue.textContent = Number(temperatureInput.value).toFixed(1);
  localStorage.setItem('nxAssistantTemperature', temperatureInput.value);
});
temperatureValue.textContent = Number(temperatureInput.value).toFixed(1);

stopSequencesInput.value = localStorage.getItem('nxAssistantStopSequences') || '';
stopSequencesInput.addEventListener('input', () => {
  localStorage.setItem('nxAssistantStopSequences', stopSequencesInput.value);
});

function updateTemperatureAvailability(){
  const thinkingOn = effortSelect.value !== 'low';
  const modelBlocked = NO_TEMPERATURE_MODELS.includes(modelSelect.value);
  const disabled = thinkingOn || modelBlocked;
  temperatureInput.disabled = disabled;
  if(modelBlocked){
    temperatureHint.textContent = '(이 모델은 온도 지정 불가)';
  } else if(thinkingOn){
    temperatureHint.textContent = '(사고 노력 "낮음"에서만 조절 가능)';
  } else {
    temperatureHint.textContent = '';
  }
}
modelSelect.addEventListener('change', updateTemperatureAvailability);
effortSelect.addEventListener('change', updateTemperatureAvailability);
updateTemperatureAvailability();

settingsBtn.addEventListener('click', () => {
  settingsPanel.classList.toggle('open');
});

let apiHistory = [];     // 서버(Anthropic API)로 그대로 전송되는 배열: {role, content}
let displayHistory = []; // 화면 렌더링 전용: {role, text, attachments:[{name,isImage,previewUrl}]}
let stagedFiles = [];    // 아직 전송 안 된 첨부파일: {name, mediaType, base64, previewUrl}
let busy = false;
let sessionCostUsd = 0;  // 이 브라우저 탭을 새로고침하기 전까지의 누적 비용(추정)

const TODAY_KEY = 'nxAssistantCost_' + new Date().toISOString().slice(0, 10);

function loadTodayCost(){
  const v = parseFloat(localStorage.getItem(TODAY_KEY) || '0');
  return isNaN(v) ? 0 : v;
}
function addTodayCost(delta){
  const total = loadTodayCost() + delta;
  localStorage.setItem(TODAY_KEY, String(total));
  return total;
}
function renderUsage(){
  sessionCostEl.textContent = '$' + sessionCostUsd.toFixed(4);
  todayCostEl.textContent = '$' + loadTodayCost().toFixed(4);
}
renderUsage();

function autoResize(){
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 160) + 'px';
}
input.addEventListener('input', autoResize);
input.addEventListener('keydown', (e) => {
  if(e.key === 'Enter' && !e.shiftKey){ e.preventDefault(); sendMessage(); }
});
sendBtn.addEventListener('click', sendMessage);

resetBtn.addEventListener('click', () => {
  if(busy) return;
  apiHistory = [];
  displayHistory = [];
  stagedFiles = [];
  renderStagedFiles();
  thread.innerHTML = '';
  thread.appendChild(emptyState);
  emptyState.style.display = '';
});

attachBtn.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', async (e) => {
  const files = Array.from(e.target.files || []);
  fileInput.value = '';
  for(const file of files){
    if(stagedFiles.length >= MAX_FILES){
      alert('첨부 파일은 최대 ' + MAX_FILES + '개까지 가능합니다.');
      break;
    }
    if(file.size > MAX_FILE_MB * 1024 * 1024){
      alert(file.name + ' 파일이 ' + MAX_FILE_MB + 'MB를 초과합니다.');
      continue;
    }
    const isImage = file.type.startsWith('image/');
    const isPdf = file.type === 'application/pdf';
    if(!isImage && !isPdf){
      alert(file.name + ': 이미지 또는 PDF 파일만 첨부할 수 있습니다.');
      continue;
    }
    const base64 = await fileToBase64(file);
    stagedFiles.push({
      name: file.name,
      mediaType: file.type,
      base64: base64,
      previewUrl: isImage ? ('data:' + file.type + ';base64,' + base64) : null
    });
  }
  renderStagedFiles();
});

function fileToBase64(file){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function renderStagedFiles(){
  stagedFilesEl.innerHTML = '';
  stagedFiles.forEach((f, idx) => {
    const chip = document.createElement('div');
    chip.className = 'staged-chip';
    if(f.previewUrl){
      const img = document.createElement('img');
      img.src = f.previewUrl;
      chip.appendChild(img);
    } else {
      const icon = document.createElement('span');
      icon.textContent = '📄';
      chip.appendChild(icon);
    }
    const name = document.createElement('span');
    name.className = 'fname';
    name.textContent = f.name;
    chip.appendChild(name);
    const removeBtn = document.createElement('button');
    removeBtn.textContent = '×';
    removeBtn.onclick = () => { stagedFiles.splice(idx, 1); renderStagedFiles(); };
    chip.appendChild(removeBtn);
    stagedFilesEl.appendChild(chip);
  });
}

function scrollToBottom(){ main.scrollTop = main.scrollHeight; }

function addRow(role, text, attachments, isError){
  emptyState.style.display = 'none';
  const row = document.createElement('div');
  row.className = 'row ' + role;

  const avatar = document.createElement('div');
  avatar.className = 'avatar';
  avatar.textContent = 'N';
  if(role === 'assistant') row.appendChild(avatar);

  const col = document.createElement('div');
  col.className = 'bubble-col';

  if(attachments && attachments.length){
    const previewWrap = document.createElement('div');
    previewWrap.className = 'attach-preview';
    attachments.forEach(a => {
      const chip = document.createElement('div');
      chip.className = 'attach-chip';
      if(a.previewUrl){
        const img = document.createElement('img');
        img.src = a.previewUrl;
        chip.appendChild(img);
      } else {
        const icon = document.createElement('span');
        icon.textContent = '📄';
        chip.appendChild(icon);
      }
      const name = document.createElement('span');
      name.textContent = a.name;
      chip.appendChild(name);
      previewWrap.appendChild(chip);
    });
    col.appendChild(previewWrap);
  }

  if(text && text.length){
    const bubble = document.createElement('div');
    bubble.className = 'bubble' + (isError ? ' error' : '');
    bubble.textContent = text;
    col.appendChild(bubble);
  }

  row.appendChild(col);
  thread.appendChild(row);
  scrollToBottom();
  return col;
}

function addTypingRow(){
  emptyState.style.display = 'none';
  const row = document.createElement('div');
  row.className = 'row assistant';
  row.id = 'typingRow';
  const avatar = document.createElement('div');
  avatar.className = 'avatar';
  avatar.textContent = 'N';
  row.appendChild(avatar);
  const col = document.createElement('div');
  col.className = 'bubble-col';
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
  col.appendChild(bubble);
  row.appendChild(col);
  thread.appendChild(row);
  scrollToBottom();
}
function removeTypingRow(){ const row = document.getElementById('typingRow'); if(row) row.remove(); }

function setBusy(state){
  busy = state;
  sendBtn.disabled = state;
  pulse.classList.toggle('busy', state);
}

async function sendMessage(){
  const text = input.value.trim();
  if((!text && stagedFiles.length === 0) || busy) return;

  if(ENDPOINT_URL.includes('여기에_')){
    addRow('assistant', 'Apps Script 웹앱 URL이 아직 설정되지 않았습니다. index.html 상단의 ENDPOINT_URL 값을 배포된 URL로 교체해주세요.', null, true);
    return;
  }

  // API로 보낼 content 구성
  let contentForApi;
  const attachmentsForDisplay = stagedFiles.map(f => ({ name: f.name, previewUrl: f.previewUrl }));

  if(stagedFiles.length > 0){
    const blocks = [];
    stagedFiles.forEach(f => {
      if(f.mediaType.startsWith('image/')){
        blocks.push({ type: 'image', source: { type: 'base64', media_type: f.mediaType, data: f.base64 } });
      } else if(f.mediaType === 'application/pdf'){
        blocks.push({ type: 'document', source: { type: 'base64', media_type: 'application/pdf', data: f.base64 } });
      }
    });
    if(text) blocks.push({ type: 'text', text: text });
    contentForApi = blocks;
  } else {
    contentForApi = text;
  }

  addRow('user', text, attachmentsForDisplay);
  apiHistory.push({ role: 'user', content: contentForApi });

  input.value = '';
  stagedFiles = [];
  renderStagedFiles();
  autoResize();

  setBusy(true);
  addTypingRow();

  try{
    const res = await fetch(ENDPOINT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' }, // preflight 회피
      body: JSON.stringify({
        messages: apiHistory,
        model: modelSelect.value,
        effort: effortSelect.value,
        maxTokens: maxTokensInput.value ? Number(maxTokensInput.value) : null,
        systemPrompt: systemPromptInput.value.trim(),
        temperature: temperatureInput.disabled ? null : Number(temperatureInput.value),
        stopSequences: stopSequencesInput.value.split(',').map(s => s.trim()).filter(Boolean),
        enableWebSearch: webSearchToggle.checked,
        enableCodeExecution: codeExecToggle.checked && !codeExecToggle.disabled,
        enableWebFetch: webFetchToggle.checked,
        enableAdvisor: advisorToggle.checked && !advisorToggle.disabled,
        advisorModel: advisorModelSelect.value
      })
    });

    const data = await res.json();
    removeTypingRow();

    if(data.error){
      addRow('assistant', '오류가 발생했습니다: ' + data.error, null, true);
    } else {
      const replyText = data.reply || '(응답이 비어 있습니다)';
      addRow('assistant', replyText);
      apiHistory.push({ role: 'assistant', content: replyText });

      if(data.usage && typeof data.usage.costUsd === 'number'){
        sessionCostUsd += data.usage.costUsd;
        addTodayCost(data.usage.costUsd);
        renderUsage();
      }
    }
  }catch(err){
    removeTypingRow();
    addRow('assistant', '연결에 실패했습니다. 네트워크 상태 또는 Apps Script 배포 설정을 확인해주세요.', null, true);
  }finally{
    setBusy(false);
    input.focus();
  }
}
</script>
</body>
</html>
