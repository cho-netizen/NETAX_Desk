<title>NETAX Desk v2.1</title>
<style>
:root{--bg:#eef1f5;--btn:#d8dde5;--btnh:#c8d0db;--btna:#b8c2d0;--border:#aeb7c4;--text:#111827;--muted:#4b5563;--link:#f3f5f8;--linkh:#dfe5ee;--accent:#1f2937;--gold:#b08d2f}
*{box-sizing:border-box} body{margin:0;font-family:"Malgun Gothic","Apple SD Gothic Neo",Arial,sans-serif;background:var(--bg);color:var(--text)}
.wrap{max-width:1180px;margin:0 auto;padding:28px 24px 48px}
header{background:#f7f8fa;border:1px solid var(--border);border-top:5px solid var(--accent);border-radius:10px;padding:24px 26px;box-shadow:0 4px 14px rgba(17,24,39,.08);margin-bottom:14px}
.header-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:nowrap}
.header-top h1{flex:1 1 auto;min-width:0;overflow-wrap:break-word}
.header-top .guide-link{flex:0 0 auto}
h1{margin:0;font-size:30px;font-weight:800;letter-spacing:-.03em}
.search{margin:0 0 22px;width:100%;height:48px;border:1px solid #9ca3af;border-radius:8px;font-size:18px;padding:0 16px;outline:none;background:#fff;color:var(--text);font-weight:600}
.search:focus{border-color:#374151;box-shadow:0 0 0 3px rgba(55,65,81,.15)}
.folders{display:grid;grid-template-columns:1fr;gap:10px}.folder{border:1px solid var(--border);border-radius:9px;overflow:hidden;background:#fff;box-shadow:0 2px 7px rgba(17,24,39,.05)}
.folder-btn{width:100%;border:0;background:var(--btn);color:var(--text);padding:16px 18px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;font-size:20px;font-weight:800;text-align:left}
.folder-btn:hover{background:var(--btnh)}.folder.open .folder-btn{background:var(--btna);border-bottom:1px solid var(--border)}.folder.pinned .folder-btn{box-shadow:inset 4px 0 0 var(--gold)}
a.folder-direct{width:100%;box-sizing:border-box;border:0;background:var(--btn);color:var(--text);padding:16px 18px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;font-size:20px;font-weight:800;text-align:left;text-decoration:none}
a.folder-direct:hover{background:var(--btnh);text-decoration:none}
.folder-left{display:flex;align-items:center;gap:12px}.folder-icon{font-size:23px;width:30px;text-align:center}.folder-meta{font-size:15px;color:#374151;font-weight:800}
.pin-badge{display:none;margin-left:10px;padding:3px 7px;border-radius:5px;background:#374151;color:white;font-size:12px}.folder.pinned .pin-badge{display:inline-block}
.panel{display:none;padding:16px;background:#fff}.folder.open .panel{display:block}.link-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px}
.link-item{display:block;min-height:48px;padding:13px 14px;border:1px solid #c5ccd6;border-radius:7px;background:var(--link);color:#111827;text-decoration:none;font-size:18px;font-weight:700;line-height:1.25}
.link-item:hover{background:var(--linkh);border-color:#9ca3af;text-decoration:underline}.hidden{display:none!important}.no-result{display:none;margin-top:18px;padding:18px;border:1px dashed #9ca3af;border-radius:8px;background:#fff;color:#374151;font-weight:700}
.conn-badge{display:inline-block;margin-left:6px;padding:1px 7px;border-radius:5px;font-size:11px;font-weight:800;vertical-align:2px;color:#fff}
.conn-badge.app{background:#1d4ed8}
.conn-badge.web{background:#c2410c}
@media(max-width:720px){.wrap{padding:18px 12px 32px}h1{font-size:25px}.folder-btn,a.folder-direct{font-size:18px;padding:15px 14px}.folder-meta{font-size:13px}.link-grid{grid-template-columns:1fr}.link-item{font-size:17px}}

.guide-link {
  display: inline-block;
  padding: 9px 14px;
  border: 1px solid #9ca3af;
  border-radius: 7px;
  background: #d8dde5;
  color: #111827;
  text-decoration: none;
  font-size: 15px;
  font-weight: 800;
  white-space: nowrap;
}
.guide-link:hover {
  background: #c8d0db;
  text-decoration: underline;
}

.status-msg{margin-top:18px;padding:18px;border:1px dashed #9ca3af;border-radius:8px;background:#fff;color:#374151;font-weight:700}
.status-msg.error{border-color:#b91c1c;color:#b91c1c}

/* ===== 편집모드(폴더/링크 추가·삭제) ===== */
.header-actions{display:flex;gap:8px;flex:0 0 auto;}
.edit-toggle-btn{display:inline-block;padding:9px 14px;border:1px solid #9ca3af;border-radius:7px;background:#d8dde5;color:#111827;cursor:pointer;font-size:15px;font-weight:800;white-space:nowrap;}
.edit-toggle-btn:hover{background:#c8d0db;}
.edit-toggle-btn.is-on{background:#1f2937;color:#fff;border-color:#1f2937;}
.edit-add-folder-btn{display:none;width:100%;margin-bottom:10px;padding:12px;border:1px dashed #9ca3af;border-radius:9px;background:#fff;color:#374151;cursor:pointer;font-weight:800;font-size:15px;}
.edit-add-folder-btn:hover{background:#f3f5f8;}
body.edit-mode .edit-add-folder-btn{display:block;}
.folder-head-row{display:flex;align-items:stretch;}
.folder-head-row .folder-btn{flex:1;}
.edit-del-folder-btn{flex:0 0 auto;border:0;border-left:1px solid var(--border);background:#f0d5d5;color:#a83232;font-size:16px;cursor:pointer;padding:0 16px;}
.edit-del-folder-btn:hover{background:#e5bcbc;}
.link-item-wrap{display:flex;align-items:stretch;}
.link-item-wrap .link-item{flex:1;border-radius:7px 0 0 7px;}
.edit-del-link-btn{flex:0 0 auto;border:1px solid #c5ccd6;border-left:0;border-radius:0 7px 7px 0;background:#f0d5d5;color:#a83232;cursor:pointer;font-size:14px;padding:0 10px;}
.edit-del-link-btn:hover{background:#e5bcbc;}
.edit-add-link-btn{grid-column:1/-1;padding:10px;border:1px dashed #9ca3af;border-radius:7px;background:#fff;color:#374151;cursor:pointer;font-weight:700;font-size:14px;}
.edit-add-link-btn:hover{background:#f3f5f8;}
</style>
</head>
<body>

<div id="appRoot">
<div class="wrap">
  <header>
    <div class="header-top">
      <h1>NETAX Desk <span style="font-size:18px;color:#6b7280;">v2.1</span></h1>
      <div class="header-actions">
        <button type="button" class="edit-toggle-btn" id="btnEditToggle">✏️ 편집</button>
        <a class="guide-link" href="guide.html">📖 Guide</a>
      </div>
    </div>
  </header>
  <input autocomplete="off" class="search" id="search" placeholder="검색어 입력: 홈택스, 양도, Claude, Drive..." type="search"/>
  <button type="button" class="edit-add-folder-btn" id="btnAddFolder">+ 새 폴더 추가</button>
  <main class="folders" id="folders"></main>
  <div class="status-msg" id="statusMsg">불러오는 중...</div>
  <div class="no-result" id="noResult">검색 결과가 없습니다.</div>
</div>
</div>

<script src="/config.js"></script>
<script>
// ── 데이터 원본 ──────────────────────────────────────────────
// GAS_URL이 설정돼 있으면 그쪽에서 실시간으로 읽고(추가·삭제도 그쪽으로 함),
// 비어있으면(config.js 미설정) 예전처럼 "웹에 게시" CSV를 읽기 전용으로 쓴다.
const GAS_URL = (window.DESK_CONFIG && window.DESK_CONFIG.GAS_URL) || '';
const FOLDERS_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQUwVHa8DnEWvrU3Kr-sOCncBFF6v9zVp1nWPlH0PkNa7_-uF6XeUVFo68DWLz4BCQHRcSf21gNHd-v/pub?gid=0&single=true&output=csv";
const LINKS_CSV_URL   = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQUwVHa8DnEWvrU3Kr-sOCncBFF6v9zVp1nWPlH0PkNa7_-uF6XeUVFo68DWLz4BCQHRcSf21gNHd-v/pub?gid=217224871&single=true&output=csv";

// ── 안드로이드 패키지명 조회 테이블 ─────────────────────────────
const APP_MAP = {
  "smartplace.naver.com": "com.naver.smartplace",
  "talk.naver.com":       "com.naver.shopping.biztalk",
  "business.kakao.com":   "com.kakao.yellowid",
  "map.naver.com":        "com.nhn.android.nmap",
  "map.kakao.com":        "net.daum.android.map",
  "drive.google.com":     "com.google.android.apps.docs",
  "mail.google.com":      "com.google.android.gm",
  "www.dropbox.com":      "com.dropbox.android",
  "onedrive.live.com":    "com.microsoft.skydrive"
};

function isAndroid() { return /Android/i.test(navigator.userAgent); }

function androidPackageFor(url) {
  try {
    const host = new URL(url).host;
    for (const key in APP_MAP) { if (host.includes(key)) return APP_MAP[key]; }
  } catch (e) {}
  return null;
}

function buildIntentUrl(url, pkg) {
  try {
    const u = new URL(url);
    const scheme = u.protocol.replace(':', '');
    const storeUrl = `https://play.google.com/store/apps/details?id=${pkg}`;
    return `intent://${u.host}${u.pathname}${u.search}#Intent;scheme=${scheme};package=${pkg};S.browser_fallback_url=${encodeURIComponent(storeUrl)};end`;
  } catch (e) {
    return url;
  }
}

function resolveLink(url, mode) {
  const m = (mode || '').trim();
  if (m === '앱') {
    const pkg = androidPackageFor(url);
    const href = (isAndroid() && pkg) ? buildIntentUrl(url, pkg) : url;
    return { href, badge: '<span class="conn-badge app" title="안드로이드에서 앱으로 자동 연결">APP</span>' };
  }
  if (m === '웹') {
    return { href: url, badge: '<span class="conn-badge web" title="앱이 있어도 웹으로 고정 열림">WEB</span>' };
  }
  return { href: url, badge: '' };
}

// ── CSV 파서 (GAS_URL 미설정 시 폴백 경로에서만 씀) ──────────────────
function parseCSV(text) {
  const rows = [];
  let row = [], field = '', inQuotes = false;
  text = text.replace(/^\uFEFF/, '');
  for (let i = 0; i < text.length; i++) {
    const c = text[i], next = text[i + 1];
    if (inQuotes) {
      if (c === '"' && next === '"') { field += '"'; i++; }
      else if (c === '"') { inQuotes = false; }
      else { field += c; }
    } else {
      if (c === '"') inQuotes = true;
      else if (c === ',') { row.push(field); field = ''; }
      else if (c === '\r') { /* skip */ }
      else if (c === '\n') { row.push(field); rows.push(row); row = []; field = ''; }
      else field += c;
    }
  }
  if (field.length || row.length) { row.push(field); rows.push(row); }
  return rows.filter(r => r.some(v => v.trim() !== ''));
}

function csvToObjects(text) {
  const rows = parseCSV(text);
  const header = rows[0].map(h => h.trim());
  return rows.slice(1).map(r => {
    const obj = {};
    header.forEach((h, i) => obj[h] = (r[i] || '').trim());
    return obj;
  });
}

async function fetchCSV(url) {
  const res = await fetch(url, { cache: 'no-store' });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  return csvToObjects(await res.text());
}

// ── GAS 호출 (GAS_URL 설정 시 읽기·쓰기 전부 이쪽) ──────────────────
async function callGas(action, payload) {
  const res = await fetch(GAS_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' }, // GAS 웹앱 CORS preflight 회피
    body: JSON.stringify(Object.assign({ action }, payload))
  });
  if (!res.ok) throw new Error('네트워크 오류 (status ' + res.status + ')');
  const data = await res.json();
  if (data.error) throw new Error(data.error);
  return data;
}

function escAttr(s){return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;');}
function escText(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// 폴더명 비교용 정규화: 일반 공백·전각 공백(U+3000)·NBSP(U+00A0)·제로폭 문자 등을
// 전부 제거한 뒤 비교해서, 구글시트 입력 과정에서 섞이기 쉬운 보이지 않는 공백 차이로
// 폴더-링크 매칭이 어긋나는 것을 방지함
function normalizeFolderKey(s) {
  return String(s || '')
    .replace(/[\u200B-\u200D\uFEFF]/g, '')   // 제로폭 문자 제거
    .replace(/[\s\u00A0\u3000]+/g, '')        // 일반 공백·NBSP·전각공백 전부 제거
    .toLowerCase();
}

// ── 편집모드 ──────────────────────────────────────────────
// GAS 웹앱이 "전체 공개"로 배포되므로, 실제 쓰기 작업은 서버(GAS)에서 비밀번호를 검증한다.
// 여기 sessionStorage는 매번 다시 입력하지 않도록 이 탭 안에서만 잠깐 기억해두는 용도일 뿐,
// 그 자체가 보안장치는 아니다(진짜 검증은 GAS 쪽 checkEditPassword_).
let editMode = false;
let lastFolders = [];

function getEditPassword() {
  let pw = sessionStorage.getItem('desk_edit_pw');
  if (pw === null) {
    pw = window.prompt('편집 비밀번호를 입력하세요.') || '';
    sessionStorage.setItem('desk_edit_pw', pw);
  }
  return pw;
}
function clearEditPassword() { sessionStorage.removeItem('desk_edit_pw'); }

async function loadAndRender() {
  const foldersEl = document.getElementById('folders');
  const statusEl = document.getElementById('statusMsg');
  statusEl.style.display = 'block';
  statusEl.classList.remove('error');
  statusEl.textContent = '불러오는 중...';
  try {
    let folderRows, linkRows;
    if (GAS_URL) {
      const data = await callGas('listAll', {});
      folderRows = data.folders;
      linkRows = data.links;
    } else {
      [folderRows, linkRows] = await Promise.all([
        fetchCSV(FOLDERS_CSV_URL),
        fetchCSV(LINKS_CSV_URL)
      ]);
    }

    const folders = folderRows
      .map(f => ({
        order: parseInt(f['순서'], 10) || 0,
        icon: f['아이콘'] || '',
        name: f['폴더명'] || '',
        links: []
      }))
      .filter(f => f.name);

    folders.sort((a, b) => a.order - b.order);

    const byName = {};
    folders.forEach(f => byName[normalizeFolderKey(f.name)] = f);
    linkRows.forEach(l => {
      const f = byName[normalizeFolderKey(l['폴더명'])];
      if (f && l['제목'] && l['URL']) f.links.push({ title: l['제목'], href: l['URL'], mode: l['연결방식'] || '' });
    });

    if (!folders.length) throw new Error('폴더 데이터가 비어 있습니다');

    const emptyFolders = folders.filter(f => f.links.length === 0).map(f => f.name);
    if (emptyFolders.length) {
      console.warn('링크가 0개로 인식된 폴더(시트의 폴더명 표기를 다시 확인해주세요):', emptyFolders);
    }

    lastFolders = folders;
    renderFolders(folders);
    statusEl.style.display = 'none';
  } catch (err) {
    console.error(err);
    statusEl.textContent = '데이터를 불러오지 못했습니다. ' + (GAS_URL ? 'GAS 배포 상태' : '구글시트 게시 상태') + ' 또는 인터넷 연결을 확인해주세요. (' + err.message + ')';
    statusEl.classList.add('error');
  }
}

function renderFolders(folders) {
  const foldersEl = document.getElementById('folders');
  foldersEl.innerHTML = folders.map(f => {
    const delFolderBtn = editMode
      ? `<button type="button" class="edit-del-folder-btn" data-action="del-folder" data-folder="${escAttr(f.name)}" title="폴더 삭제">🗑</button>`
      : '';

    // 링크가 1개뿐인 폴더는(편집모드가 아닐 때만) 아코디언 대신 폴더명 자체가 바로
    // 클릭 가능한 링크가 되도록 렌더링 — 편집모드에서는 삭제·추가 버튼이 필요하므로
    // 항상 아코디언 형태로 펼쳐서 보여준다.
    if (f.links.length === 1 && !editMode) {
      const resolved = resolveLink(f.links[0].href, f.links[0].mode);
      return `
<a class="folder folder-direct" data-folder="${escAttr(f.name.toLowerCase())}" href="${escAttr(resolved.href)}" rel="noopener noreferrer" target="_blank">
<span class="folder-left"><span class="folder-icon">${escText(f.icon)}</span><span class="folder-name">${escText(f.name)}</span></span>
<span class="folder-meta">${resolved.badge}</span>
</a>`;
    }

    const linksHtml = f.links.map(l => {
      const resolved = resolveLink(l.href, l.mode);
      const delLinkBtn = editMode
        ? `<button type="button" class="edit-del-link-btn" data-action="del-link" data-folder="${escAttr(f.name)}" data-title="${escAttr(l.title)}" title="링크 삭제">✕</button>`
        : '';
      return `<div class="link-item-wrap"><a class="link-item" href="${escAttr(resolved.href)}" rel="noopener noreferrer" target="_blank">${escText(l.title)}${resolved.badge}</a>${delLinkBtn}</div>`;
    }).join('');
    const addLinkBtn = editMode
      ? `<button type="button" class="edit-add-link-btn" data-action="add-link" data-folder="${escAttr(f.name)}">+ 링크 추가</button>`
      : '';

    return `
<section class="folder" data-folder="${escAttr(f.name.toLowerCase())}">
<div class="folder-head-row">
<button aria-expanded="false" class="folder-btn" type="button">
<span class="folder-left"><span class="folder-icon">${escText(f.icon)}</span><span class="folder-name">${escText(f.name)}</span></span>
<span class="folder-meta">${f.links.length}개 <span class="pin-badge">고정</span></span>
</button>
${delFolderBtn}
</div>
<div class="panel"><div class="link-grid">${linksHtml}${addLinkBtn}</div></div>
</section>`;
  }).join('');

  bindFolderInteractions();
}

// ── 편집 액션 (추가/삭제) — #folders 컨테이너에 이벤트 위임으로 한 번만 걸어둔다.
// 재렌더링될 때마다 새 리스너를 계속 붙이지 않도록 하기 위함.
document.getElementById('folders').addEventListener('click', async (e) => {
  const btn = e.target.closest('[data-action]');
  if (!btn) return;
  e.preventDefault();
  e.stopPropagation();
  const action = btn.dataset.action;

  try {
    if (action === 'del-folder') {
      const name = btn.dataset.folder;
      if (!window.confirm(`"${name}" 폴더와 그 안의 모든 링크를 삭제할까요? 되돌릴 수 없습니다.`)) return;
      await callGas('deleteFolder', { name, password: getEditPassword() });
      await loadAndRender();
    } else if (action === 'del-link') {
      const folderName = btn.dataset.folder, title = btn.dataset.title;
      if (!window.confirm(`"${title}" 링크를 삭제할까요?`)) return;
      await callGas('deleteLink', { folderName, title, password: getEditPassword() });
      await loadAndRender();
    } else if (action === 'add-link') {
      const folderName = btn.dataset.folder;
      const title = window.prompt('링크 이름을 입력하세요.');
      if (!title) return;
      const url = window.prompt('URL을 입력하세요. (https:// 생략 가능)');
      if (!url) return;
      const mode = window.prompt('연결방식 — 앱/웹/공백 중 하나 (모르면 그냥 확인)', '') || '';
      await callGas('addLink', { folderName, title, url, mode, password: getEditPassword() });
      await loadAndRender();
    }
  } catch (err) {
    if (String(err.message || '').includes('비밀번호')) clearEditPassword(); // 틀렸으면 다음에 다시 물어보게
    alert('처리 중 오류: ' + err.message);
  }
});

document.getElementById('btnAddFolder').addEventListener('click', async () => {
  const name = window.prompt('새 폴더 이름을 입력하세요.');
  if (!name) return;
  const icon = window.prompt('아이콘(이모지, 선택— 그냥 확인해도 됨)', '') || '';
  try {
    await callGas('addFolder', { name, icon, password: getEditPassword() });
    await loadAndRender();
  } catch (err) {
    if (String(err.message || '').includes('비밀번호')) clearEditPassword();
    alert('처리 중 오류: ' + err.message);
  }
});

const btnEditToggle = document.getElementById('btnEditToggle');
btnEditToggle.addEventListener('click', () => {
  if (!GAS_URL) { alert('편집 기능을 쓰려면 config.js에 GAS_URL을 먼저 설정해야 합니다.'); return; }
  editMode = !editMode;
  document.body.classList.toggle('edit-mode', editMode);
  btnEditToggle.classList.toggle('is-on', editMode);
  btnEditToggle.textContent = editMode ? '✏️ 편집중 (끄기)' : '✏️ 편집';
  renderFolders(lastFolders); // 데이터를 다시 안 불러오고 지금 있는 데이터로 화면만 다시 그림
});

// ── 검색/펼치기 — search 인풋은 페이지 전체에서 한 번만 존재하므로 리스너도 한 번만 건다.
// (폴더 목록은 재렌더링될 때마다 통째로 새 DOM이라 그쪽 리스너만 매번 다시 붙이면 됨 → bindFolderInteractions)
function bindFolderInteractions() {
  const folders = Array.from(document.querySelectorAll('.folder'));
  let pinned = null;

  function closeAllExcept(target) { folders.forEach(f => { if (f !== target) { f.classList.remove('open'); const b = f.querySelector('.folder-btn'); if (b) b.setAttribute('aria-expanded', 'false'); } }); }
  function openFolder(f) { closeAllExcept(f); f.classList.add('open'); const b = f.querySelector('.folder-btn'); if (b) b.setAttribute('aria-expanded', 'true'); }
  function closeFolder(f) { if (f !== pinned) { f.classList.remove('open'); const b = f.querySelector('.folder-btn'); if (b) b.setAttribute('aria-expanded', 'false'); } }

  folders.forEach(f => {
    const btn = f.querySelector('.folder-btn');
    if (!btn) return; // 직접 링크(단일 링크) 폴더는 펼치기/고정 동작 자체가 필요 없음 — 클릭하면 바로 이동
    const search = document.getElementById('search');
    f.addEventListener('mouseenter', () => { if (!search.value.trim()) openFolder(f); });
    f.addEventListener('mouseleave', () => { if (!search.value.trim()) closeFolder(f); });
    btn.addEventListener('click', e => {
      e.preventDefault();
      if (pinned === f) {
        f.classList.remove('pinned'); pinned = null; f.classList.remove('open'); btn.setAttribute('aria-expanded', 'false');
      } else {
        if (pinned) pinned.classList.remove('pinned');
        pinned = f;
        folders.forEach(x => x.classList.remove('pinned'));
        f.classList.add('pinned');
        openFolder(f);
      }
    });
  });

  // 검색창에 이미 입력된 상태로 재렌더링됐을 수 있으니(편집모드 토글 등), 지금 값 기준으로 즉시 다시 필터링
  applySearchFilter(folders);
}

function applySearchFilter(folders) {
  const search = document.getElementById('search');
  const noResult = document.getElementById('noResult');
  const q = search.value.trim().toLowerCase();
  if (!q) {
    folders.forEach(f => { f.classList.remove('hidden'); f.querySelectorAll('.link-item').forEach(a => a.classList.remove('hidden')); });
    noResult.style.display = 'none';
    return;
  }
  let any = false;
  folders.forEach(f => {
    const fname = (f.dataset.folder || '').toLowerCase();
    let hit = fname.includes(q);
    f.querySelectorAll('.link-item').forEach(a => {
      const m = a.textContent.toLowerCase().includes(q) || a.href.toLowerCase().includes(q);
      a.classList.toggle('hidden', !m && !fname.includes(q));
      if (m) hit = true;
    });
    f.classList.toggle('hidden', !hit);
    if (hit) { f.classList.add('open'); any = true; } else f.classList.remove('open');
  });
  noResult.style.display = any ? 'none' : 'block';
}

document.getElementById('search').addEventListener('input', () => {
  applySearchFilter(Array.from(document.querySelectorAll('.folder')));
});

// 모든 함수·상수 선언이 끝난 뒤에 바로 실행
loadAndRender();
</script>
