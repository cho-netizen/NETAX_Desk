<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%231b2a41'/%3E%3Ctext x='32' y='45' font-family='Georgia,serif' font-size='34' font-weight='700' fill='%23c9a227' text-anchor='middle'%3EN%3C/text%3E%3C/svg%3E">
<title>NX 작업실 — 레이아웃 프로토타입</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@500;600;700&family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#0D1B3D; --navy-deep:#081226; --gold:#C8A244; --gold-light:#DCC17E;
    --bar-bg:#20242c; --bar-fg:#e8e8ec;
    --bg:#e9eaee; --panel:#ffffff; --line:#d8dce3; --ink:#1b2430; --sub:#6b7280;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;background:var(--bg);font-family:'Noto Sans KR',sans-serif;color:var(--ink);}
  body{ display:flex; flex-direction:column; overflow:hidden; }

  /* ===== 상단바 ===== */
  .topbar{
    display:flex; align-items:center; gap:14px;
    height:52px; padding:0 16px; background:var(--navy); color:#fff;
    border-bottom:3px solid var(--gold); flex-shrink:0;
  }
  .brand{ font-family:'Noto Serif KR',serif; font-weight:700; font-size:15px; color:var(--gold-light); letter-spacing:0.5px; white-space:nowrap; }
  .case-select{ display:flex; align-items:center; gap:8px; }
  .case-select select{
    background:rgba(255,255,255,0.08); color:#fff; border:1px solid rgba(255,255,255,0.25);
    border-radius:6px; padding:6px 10px; font-family:inherit; font-size:12.5px; cursor:pointer;
  }
  .case-select select:focus{ outline:2px solid var(--gold-light); outline-offset:1px; }
  .case-select select option{ color:var(--ink); background:#fff; }
  .case-path{ font-size:11.5px; color:rgba(255,255,255,0.55); }
  .spacer{ flex:1; }
  .layout-toggle{
    display:flex; align-items:center; gap:4px; background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.25); border-radius:8px; padding:3px;
  }
  .layout-toggle button{
    background:none; border:none; color:rgba(255,255,255,0.55); cursor:pointer;
    padding:6px 9px; border-radius:6px; font-size:15px; line-height:1; font-family:inherit;
  }
  .layout-toggle button.active{ background:var(--gold); color:var(--navy-deep); }
  .layout-toggle button:hover:not(.active){ color:#fff; }

  /* ===== 작업 영역 ===== */
  .workspace{ display:flex; flex:1; min-height:0; }
  .workspace.layout-row{ flex-direction:row; }
  .workspace.layout-col{ flex-direction:column; }

  .panel{ display:flex; flex-direction:column; min-width:0; min-height:0; background:var(--panel); }
  .layout-row .panel.chat{ flex:0 0 40%; border-right:1px solid var(--line); }
  .layout-row .panel.explorer{ flex:1; }
  .layout-col .panel.chat{ flex:0 0 auto; min-height:300px; max-height:42%; border-bottom:1px solid var(--line); }
  .layout-col .panel.explorer{ flex:1; }

  .panel-head{
    display:flex; align-items:center; gap:8px; height:38px; padding:0 14px;
    border-bottom:1px solid var(--line); font-size:12.5px; font-weight:700; color:var(--navy);
    flex-shrink:0; background:#f4f5f8;
  }
  .panel-head .dot{ width:6px; height:6px; border-radius:50%; background:var(--gold); }
  .autoref-toggle{
    display:flex; align-items:center; gap:6px;
    font-family:inherit; font-size:11.5px; font-weight:700; cursor:pointer;
    border:1px solid var(--line); border-radius:20px; padding:4px 10px 4px 8px;
    background:#eef0f3; color:#8a93a3;
  }
  .autoref-toggle .dot{ width:7px; height:7px; border-radius:50%; background:#b4bac4; flex-shrink:0; }
  .autoref-toggle.is-on{ background:var(--navy); color:#fff; border-color:var(--navy); }
  .autoref-toggle.is-on .dot{ background:var(--gold); box-shadow:0 0 4px rgba(200,162,68,0.7); }

  /* ===== AI 채팅 패널 ===== */
  .chat-body{ flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:12px; }
  .msg{ max-width:82%; padding:10px 13px; border-radius:10px; font-size:13.5px; line-height:1.55; }
  .msg.ai{ background:#f0f2f6; color:var(--ink); align-self:flex-start; border-top-left-radius:2px; }
  .msg.me{ background:var(--navy); color:#fff; align-self:flex-end; border-top-right-radius:2px; }
  .chat-input{ display:flex; gap:8px; padding:12px; border-top:1px solid var(--line); flex-shrink:0; }
  .chat-input input{
    flex:1; border:1px solid var(--line); border-radius:8px; padding:9px 12px;
    font-family:inherit; font-size:13.5px;
  }
  .chat-input button{
    background:var(--navy); color:#fff; border:none; border-radius:8px;
    padding:9px 16px; font-family:inherit; font-size:13px; font-weight:600; cursor:pointer;
  }
  .chat-input button:hover{ background:var(--navy-deep); }

  /* ===== 파일 드래그&드롭 첨부 ===== */
  .chat-body.drag-over{ background:#eef3fb; outline:2px dashed var(--gold); outline-offset:-6px; }
  .attach-bar{ display:flex; flex-wrap:wrap; gap:6px; padding:8px 12px 0 12px; }
  .attach-chip{
    display:flex; align-items:center; gap:6px; background:#f0f2f6; border:1px solid var(--line);
    border-radius:14px; padding:4px 8px; font-size:11.5px; color:var(--ink);
  }
  .attach-chip .x{ cursor:pointer; color:var(--sub); font-weight:700; padding:0 2px; }
  .attach-chip .x:hover{ color:#a83232; }

  /* ===== 탐색기 / 편집기 패널 ===== */
  .breadcrumb{ display:flex; align-items:center; gap:6px; font-size:12.5px; color:var(--sub); }
  .breadcrumb b{ color:var(--navy); }
  .breadcrumb .sep{ color:#c3c8d1; }
  .explorer-body{ flex:1; overflow-y:auto; padding:6px; }
  .folder-row, .file-row{
    display:flex; align-items:center; gap:10px; padding:9px 12px; border-radius:6px;
    font-size:13.5px; cursor:pointer; color:var(--ink);
  }
  .folder-row:hover, .file-row:hover{ background:#f0f2f6; }
  .folder-row .icon{ color:var(--gold); font-size:15px; }
  .file-row .icon{ color:#8a93a3; font-size:15px; }
  .file-row .meta{ margin-left:auto; font-size:11.5px; color:var(--sub); }

  /* ===== 탐색기 상태 표시 ===== */
  .explorer-status{ padding:16px 14px; font-size:13px; color:var(--sub); }
  .explorer-status.is-error{ color:#a83232; }
  .explorer-empty{ padding:16px 14px; font-size:12.5px; color:var(--sub); }

  /* ===== 편집기(실제 iframe) ===== */
  .editor-toolbar{
    display:flex; align-items:center; gap:10px; height:40px; padding:0 12px;
    border-bottom:1px solid var(--line); flex-shrink:0; background:#f9fafb;
  }
  .editor-filename{ font-size:12.5px; color:var(--sub); }
  .editor-frame{ flex:1; width:100%; border:none; background:#fff; }
  .back-btn{
    background:none; border:1px solid var(--line); border-radius:6px; padding:5px 11px;
    font-size:12px; color:var(--sub); cursor:pointer; font-family:inherit;
  }
  .back-btn:hover{ border-color:var(--navy); color:var(--navy); }

  @media (max-width: 720px){
    .layout-row .panel.chat{ flex:0 0 45%; }
  }
</style>
</head>
<body>

  <div class="topbar">
    <div class="brand">NX 작업실</div>
    <div class="case-select">
      <select id="customerSelect">
        <option value="">고객 불러오는 중…</option>
      </select>
    </div>
    <div class="case-path" id="casePath">불러오는 중…</div>
    <div class="spacer"></div>
    <div class="layout-toggle" role="group" aria-label="레이아웃 전환">
      <button id="btnRow" title="좌우 배치" aria-label="좌우 배치">⬓</button>
      <button id="btnCol" title="상하 배치" aria-label="상하 배치">⬒</button>
    </div>
  </div>

  <div class="workspace" id="workspace">
    <div class="panel chat">
      <div class="panel-head">
        <span class="dot"></span> AI 채팅
        <div class="spacer"></div>
        <button type="button" id="btnAutoRef" class="autoref-toggle" title="자동참조 모드: AI가 알아서 폴더/파일을 읽을지, 명시적으로 요청했을 때만 읽을지"><span class="dot"></span>자동참조 OFF</button>
      </div>
      <div class="chat-body" id="chatBody">
        <div class="msg ai">안녕하세요. 우측 탐색기에서 보고 계신 위치나 열어두신 파일에 대해 물어보시면 답변해드립니다. (자동참조 토글로 "알아서 읽기" 여부를 바꿀 수 있어요, 또는 우측 파일을 여기로 끌어다 놓으셔도 됩니다)</div>
      </div>
      <div class="attach-bar" id="attachBar" style="display:none;"></div>
      <div class="chat-input">
        <input type="text" id="chatInputEl" placeholder="메시지를 입력하세요… (파일을 여기로 끌어다 놓을 수 있어요)" aria-label="메시지 입력">
        <button type="button" id="btnChatSend">보내기</button>
      </div>
    </div>

    <div class="panel explorer">
      <div class="panel-head">
        <span class="dot"></span>
        <div class="breadcrumb" id="breadcrumb">&nbsp;</div>
      </div>

      <div id="explorerView">
        <div class="explorer-body" id="explorerBody">
          <div class="explorer-status">불러오는 중…</div>
        </div>
      </div>

      <div id="editorView" style="display:none; flex:1; flex-direction:column; min-height:0;">
        <div class="editor-toolbar">
          <button class="back-btn" id="btnBack">‹ 탐색기로 돌아가기</button>
          <span class="editor-filename" id="editorFilename"></span>
        </div>
        <iframe id="editorFrame" class="editor-frame" title="문서 편집기"></iframe>
      </div>
    </div>
  </div>

<script>
  // ============================================================
  // 설정 — 아래 두 값만 채우면 실제 데이터로 동작합니다.
  // ============================================================
  const GAS_URL = 'https://script.google.com/macros/s/AKfycbz9pam82WMSMKHYo6-6EtEguMbpZ0AaqHirVzwcW6ZFRsdq4WGluvhpPkYUoTE2l_bm/exec';
  const REPORT_WRITER_URL = 'https://desk.netax.kr/report-writer/'; // 실제 report-writer 경로로 교체

  // ============================================================
  // 레이아웃 전환 (기존 그대로)
  // ============================================================
  const workspace = document.getElementById('workspace');
  const btnRow = document.getElementById('btnRow');
  const btnCol = document.getElementById('btnCol');
  const LAYOUT_KEY = 'nx_workspace_layout';

  function applyLayout(mode){
    workspace.classList.toggle('layout-row', mode === 'row');
    workspace.classList.toggle('layout-col', mode === 'col');
    btnRow.classList.toggle('active', mode === 'row');
    btnCol.classList.toggle('active', mode === 'col');
  }
  function detectDefault(){
    return window.innerWidth >= window.innerHeight ? 'row' : 'col';
  }
  function initLayout(){
    const saved = localStorage.getItem(LAYOUT_KEY);
    applyLayout(saved || detectDefault());
  }
  btnRow.addEventListener('click', () => { applyLayout('row'); localStorage.setItem(LAYOUT_KEY, 'row'); });
  btnCol.addEventListener('click', () => { applyLayout('col'); localStorage.setItem(LAYOUT_KEY, 'col'); });
  initLayout();

  // ============================================================
  // GAS 호출 (listFolder)
  // ============================================================
  async function callGas(action, payload){
    const res = await fetch(GAS_URL, {
      method: 'POST',
      // GAS 웹앱의 CORS preflight 회피를 위해 text/plain으로 보냄 (서버에서 JSON.parse로 처리)
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(Object.assign({ action }, payload))
    });
    if (!res.ok) throw new Error('네트워크 오류 (status ' + res.status + ')');
    return res.json();
  }

  async function listFolder(path){
    const data = await callGas('listFolder', { path });
    if (data.error) throw new Error(data.error);
    return data; // { path, folderId, folders:[{id,name}], files:[{id,name,mimeType,modifiedDate,url}] }
  }

  // ============================================================
  // 상태
  // ============================================================
  const customerSelect = document.getElementById('customerSelect');
  const casePathEl = document.getElementById('casePath');
  const breadcrumbEl = document.getElementById('breadcrumb');
  const explorerBody = document.getElementById('explorerBody');
  const explorerView = document.getElementById('explorerView');
  const editorView = document.getElementById('editorView');
  const editorFrame = document.getElementById('editorFrame');
  const editorFilename = document.getElementById('editorFilename');

  // explorerPath: [고객명, 사건명, ...하위 폴더들] — 항상 최소 2단계(고객/사건) 유지
  let explorerPath = [];

  function setSelectOptions(selectEl, names, placeholderIfEmpty){
    selectEl.innerHTML = '';
    if (!names.length){
      const opt = document.createElement('option');
      opt.value = '';
      opt.textContent = placeholderIfEmpty;
      selectEl.appendChild(opt);
      return;
    }
    names.forEach(name=>{
      const opt = document.createElement('option');
      opt.value = name;
      opt.textContent = name;
      selectEl.appendChild(opt);
    });
  }

  function updateCasePath(){
    casePathEl.textContent = explorerPath.length ? explorerPath.join(' / ') : '고객을 선택하세요';
  }

  function renderBreadcrumb(){
    breadcrumbEl.innerHTML = '';
    explorerPath.forEach((seg, i)=>{
      const b = document.createElement('b');
      b.textContent = seg;
      if (i < explorerPath.length - 1){
        b.style.cursor = 'pointer';
        b.addEventListener('click', ()=> navigateTo(explorerPath.slice(0, i + 1)));
      }
      breadcrumbEl.appendChild(b);
      if (i < explorerPath.length - 1){
        const sep = document.createElement('span');
        sep.className = 'sep';
        sep.textContent = '›';
        breadcrumbEl.appendChild(sep);
      }
    });
  }

  function showExplorerStatus(text, isError){
    explorerBody.innerHTML = '';
    const div = document.createElement('div');
    div.className = 'explorer-status' + (isError ? ' is-error' : '');
    div.textContent = text;
    explorerBody.appendChild(div);
  }

  function iconForFile(mimeType){
    if (mimeType && mimeType.indexOf('folder') !== -1) return '📁';
    if (mimeType && mimeType.indexOf('image/') === 0) return '🖼️';
    if (mimeType === 'application/pdf') return '📕';
    return '📄';
  }

  function renderExplorer(data){
    explorerPath = data.path;
    renderBreadcrumb();
    updateCasePath();
    explorerBody.innerHTML = '';

    // 최상위(고객 폴더) 밑으로 내려온 상태에서만 ".." 상위 폴더 이동 허용
    if (explorerPath.length > 1){
      const up = document.createElement('div');
      up.className = 'folder-row';
      up.innerHTML = '<span class="icon">📁</span> .. (상위 폴더)';
      up.addEventListener('click', ()=> navigateTo(explorerPath.slice(0, -1)));
      explorerBody.appendChild(up);
    }

    data.folders.forEach(f=>{
      const row = document.createElement('div');
      row.className = 'folder-row';
      row.innerHTML = '<span class="icon">📁</span> ' + escapeHtml(f.name);
      row.addEventListener('click', ()=> navigateTo(explorerPath.concat([f.name])));
      explorerBody.appendChild(row);
    });

    data.files.forEach(f=>{
      const row = document.createElement('div');
      row.className = 'file-row';
      row.draggable = true;
      row.innerHTML = '<span class="icon">' + iconForFile(f.mimeType) + '</span> '
        + escapeHtml(f.name) + '<span class="meta">' + escapeHtml(f.modifiedDate || '') + '</span>';
      row.addEventListener('click', ()=> openEditor(f));
      row.addEventListener('dragstart', (e)=>{
        e.dataTransfer.setData('application/json', JSON.stringify({ id: f.id, name: f.name, mimeType: f.mimeType }));
        e.dataTransfer.effectAllowed = 'copy';
      });
      explorerBody.appendChild(row);
    });

    if (!data.folders.length && !data.files.length){
      const empty = document.createElement('div');
      empty.className = 'explorer-empty';
      empty.textContent = '이 폴더는 비어 있습니다.';
      explorerBody.appendChild(empty);
    }
  }

  function escapeHtml(s){
    return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  async function navigateTo(path){
    showExplorerStatus('불러오는 중…');
    try{
      const data = await listFolder(path);
      renderExplorer(data);
    }catch(err){
      showExplorerStatus('폴더를 불러오지 못했습니다: ' + err.message, true);
    }
  }

  // 지금 편집기에 열려 있는 파일 (없으면 null) — 채팅으로 넘길 "현재 화면 상태" 컨텍스트에 사용
  let currentOpenFile = null;

  // 텍스트 계열(우리 렌더러로 열 대상)인지 판별 — 그 외(이미지/PDF/기타)는 구글드라이브 자체 미리보기로 보냄
  function isTextRenderable(mimeType, name){
    if (mimeType === 'application/vnd.google-apps.document') return true;
    if (mimeType && mimeType.indexOf('text/') === 0) return true;
    if (/\.(md|txt|html?|htm)$/i.test(name || '')) return true;
    return false;
  }

  function openEditor(file){
    explorerView.style.display = 'none';
    editorView.style.display = 'flex';
    editorFilename.textContent = file.name;
    currentOpenFile = { id: file.id, name: file.name };

    if (isTextRenderable(file.mimeType, file.name)){
      editorFrame.src = REPORT_WRITER_URL + '?fileId=' + encodeURIComponent(file.id);
    } else {
      // 이미지・PDF・기타 파일: 구글드라이브 자체 미리보기 사용 (별도 뷰어를 만들 필요 없음)
      editorFrame.src = 'https://drive.google.com/file/d/' + encodeURIComponent(file.id) + '/preview';
    }
  }

  document.getElementById('btnBack').addEventListener('click', ()=>{
    editorFrame.src = 'about:blank';
    editorView.style.display = 'none';
    explorerView.style.display = 'block';
    currentOpenFile = null;
  });

  // ============================================================
  // 고객/사건 선택 로딩
  // ============================================================
  async function loadCustomers(){
    setSelectOptions(customerSelect, [], '고객 불러오는 중…');
    try{
      const data = await listFolder([]);
      const names = data.folders.map(f => f.name);
      setSelectOptions(customerSelect, names, '고객 폴더 없음');
      if (names.length){
        customerSelect.value = names[0];
        await navigateTo([names[0]]);
      } else {
        showExplorerStatus('고객 폴더가 없습니다.');
        updateCasePath();
      }
    }catch(err){
      setSelectOptions(customerSelect, [], '불러오기 실패');
      showExplorerStatus('고객 목록을 불러오지 못했습니다: ' + err.message, true);
    }
  }

  customerSelect.addEventListener('change', ()=>{
    if (customerSelect.value) navigateTo([customerSelect.value]);
  });

  loadCustomers();

  // ============================================================
  // 자동참조 토글 (ON: AI가 알아서 판단해 폴더/파일을 읽음 / OFF: 명시적으로 요청했을 때만)
  // ============================================================
  const AUTOREF_KEY = 'nx_autoref_mode';
  const btnAutoRef = document.getElementById('btnAutoRef');
  let autoRefMode = localStorage.getItem(AUTOREF_KEY) === '1';

  function renderAutoRefButton(){
    btnAutoRef.innerHTML = '<span class="dot"></span>자동참조 ' + (autoRefMode ? 'ON' : 'OFF');
    btnAutoRef.classList.toggle('is-on', autoRefMode);
  }
  btnAutoRef.addEventListener('click', ()=>{
    autoRefMode = !autoRefMode;
    localStorage.setItem(AUTOREF_KEY, autoRefMode ? '1' : '0');
    renderAutoRefButton();
  });
  renderAutoRefButton();

  // ============================================================
  // AI 채팅 — 실제 GAS 연결
  // ============================================================
  const chatBody = document.getElementById('chatBody');
  const chatInputEl = document.getElementById('chatInputEl');
  const btnChatSend = document.getElementById('btnChatSend');
  const attachBar = document.getElementById('attachBar');

  let chatMessages = []; // Claude API 형식: [{role:'user'|'assistant', content:'...'}]
  let pendingAttachments = []; // [{id,name,mimeType}] — 드래그로 채팅에 끌어다 놓은 파일들 (다음 전송에 무조건 첨부)

  function renderAttachBar(){
    attachBar.innerHTML = '';
    if (!pendingAttachments.length){
      attachBar.style.display = 'none';
      return;
    }
    attachBar.style.display = 'flex';
    pendingAttachments.forEach(f=>{
      const chip = document.createElement('div');
      chip.className = 'attach-chip';
      chip.innerHTML = '📎 ' + escapeHtml(f.name) + ' <span class="x" title="첨부 취소">✕</span>';
      chip.querySelector('.x').addEventListener('click', ()=>{
        pendingAttachments = pendingAttachments.filter(a => a.id !== f.id);
        renderAttachBar();
      });
      attachBar.appendChild(chip);
    });
  }

  function addAttachment(file){
    if (!file || !file.id) return;
    if (pendingAttachments.find(a => a.id === file.id)) return; // 중복 방지
    pendingAttachments.push({ id: file.id, name: file.name, mimeType: file.mimeType });
    renderAttachBar();
  }

  // 파일탐색기에서 채팅창으로 드래그&드롭
  chatBody.addEventListener('dragover', (e)=>{
    e.preventDefault();
    e.dataTransfer.dropEffect = 'copy';
    chatBody.classList.add('drag-over');
  });
  chatBody.addEventListener('dragleave', ()=>{
    chatBody.classList.remove('drag-over');
  });
  chatBody.addEventListener('drop', (e)=>{
    e.preventDefault();
    chatBody.classList.remove('drag-over');
    const raw = e.dataTransfer.getData('application/json');
    if (!raw) return;
    try{ addAttachment(JSON.parse(raw)); }catch(err){ console.warn('첨부 데이터 파싱 실패', err); }
  });

  function appendBubble(role, text){
    const div = document.createElement('div');
    div.className = 'msg ' + (role === 'user' ? 'me' : 'ai');
    div.textContent = text;
    chatBody.appendChild(div);
    chatBody.scrollTop = chatBody.scrollHeight;
    return div;
  }

  async function sendChatMessage(){
    const text = chatInputEl.value.trim();
    if (!text) return;

    const attachmentsForThisMessage = pendingAttachments.slice();
    const attachNote = attachmentsForThisMessage.length
      ? ' 📎 ' + attachmentsForThisMessage.map(a => a.name).join(', ')
      : '';

    appendBubble('user', text + attachNote);
    chatMessages.push({ role: 'user', content: text });
    chatInputEl.value = '';
    chatInputEl.disabled = true;
    btnChatSend.disabled = true;
    pendingAttachments = [];
    renderAttachBar();

    const thinkingBubble = appendBubble('assistant', '생각 중…');

    try{
      const res = await fetch(GAS_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({
          messages: chatMessages,
          context: {
            currentPath: explorerPath,
            openFile: currentOpenFile,
            attachedFiles: attachmentsForThisMessage
          },
          autoRef: autoRefMode
        })
      });
      const data = await res.json();
      if (data.error){
        thinkingBubble.textContent = '오류: ' + data.error;
      } else {
        thinkingBubble.textContent = data.reply || '(빈 응답)';
        chatMessages.push({ role: 'assistant', content: data.reply || '' });
      }
    }catch(err){
      thinkingBubble.textContent = '네트워크 오류: ' + (err && err.message ? err.message : err);
    }finally{
      chatInputEl.disabled = false;
      btnChatSend.disabled = false;
      chatInputEl.focus();
    }
  }

  btnChatSend.addEventListener('click', sendChatMessage);
  chatInputEl.addEventListener('keydown', (e)=>{
    if (e.key === 'Enter' && !e.shiftKey){
      e.preventDefault();
      sendChatMessage();
    }
  });
</script>
</body>
</html>
