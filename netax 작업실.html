<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%231b2a41'/%3E%3Ctext x='32' y='45' font-family='Georgia,serif' font-size='34' font-weight='700' fill='%23c9a227' text-anchor='middle'%3EN%3C/text%3E%3C/svg%3E">
<title>NX 작업실 — 레이아웃 프로토타입</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@500;600;700&family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#0D1B3D; --navy-deep:#081226; --gold:#C8A244; --gold-light:#DCC17E;
    --bar-bg:#20242c; --bar-fg:#e8e8ec;
    --bg:#e9eaee; --panel:#ffffff; --line:#d8dce3; --ink:#1b2430; --sub:#6b7280;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;background:var(--bg);font-family:'Noto Sans KR',sans-serif;color:var(--ink);}
  body{ display:flex; flex-direction:column; overflow:hidden; }

  /* ===== 상단바 ===== */
  .topbar{
    display:flex; align-items:center; gap:14px;
    height:52px; padding:0 16px; background:var(--navy); color:#fff;
    border-bottom:3px solid var(--gold); flex-shrink:0;
  }
  .brand{ font-family:'Noto Serif KR',serif; font-weight:700; font-size:15px; color:var(--gold-light); letter-spacing:0.5px; white-space:nowrap; }
  .case-select{ display:flex; align-items:center; gap:8px; }
  .case-select select{
    background:rgba(255,255,255,0.08); color:#fff; border:1px solid rgba(255,255,255,0.25);
    border-radius:6px; padding:6px 10px; font-family:inherit; font-size:12.5px; cursor:pointer;
  }
  .case-select select:focus{ outline:2px solid var(--gold-light); outline-offset:1px; }
  .case-select select option{ color:var(--ink); background:#fff; }
  .case-path{ font-size:11.5px; color:rgba(255,255,255,0.55); }
  .spacer{ flex:1; }
  .layout-toggle{
    display:flex; align-items:center; gap:4px; background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.25); border-radius:8px; padding:3px;
  }
  .layout-toggle button{
    background:none; border:none; color:rgba(255,255,255,0.55); cursor:pointer;
    padding:6px 9px; border-radius:6px; font-size:15px; line-height:1; font-family:inherit;
  }
  .layout-toggle button.active{ background:var(--gold); color:var(--navy-deep); }
  .layout-toggle button:hover:not(.active){ color:#fff; }

  .settings-btn{
    font-family:inherit; font-size:12px; font-weight:600; cursor:pointer;
    border:1px solid rgba(255,255,255,0.25); border-radius:8px; padding:6px 10px;
    background:rgba(255,255,255,0.08); color:#e8e8ec;
  }
  .settings-btn:hover{ background:rgba(255,255,255,0.16); }

  /* ===== AI 설정 모달 ===== */
  .modal-overlay{
    position:fixed; inset:0; background:rgba(13,27,61,0.55);
    display:flex; align-items:center; justify-content:center; z-index:100;
  }
  .modal-panel{
    width:min(420px, 92vw); max-height:86vh; overflow-y:auto;
    background:#fff; border-radius:10px; box-shadow:0 12px 32px rgba(0,0,0,0.25);
  }
  .modal-head{
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 18px; background:var(--navy); color:#fff;
    font-family:'Noto Serif KR',serif; font-weight:700; font-size:15px;
    border-radius:10px 10px 0 0;
  }
  .modal-close{ cursor:pointer; color:rgba(255,255,255,0.7); font-size:14px; }
  .modal-close:hover{ color:#fff; }
  .modal-body{ padding:16px 18px; display:flex; flex-direction:column; gap:4px; }
  .modal-label{ font-size:12px; font-weight:700; color:var(--navy); margin-top:10px; margin-bottom:2px; }
  .modal-hint{ font-size:11px; color:var(--sub); line-height:1.5; margin-top:3px; }
  .modal-body select, .modal-body input[type="number"], .modal-body textarea{
    font-family:inherit; font-size:13px; padding:7px 9px; border:1px solid var(--line); border-radius:6px;
    color:var(--ink); width:100%;
  }
  .modal-body textarea{ resize:vertical; }
  .modal-checkrow{ display:flex; flex-direction:column; gap:6px; margin-top:8px; font-size:12.5px; color:var(--ink); }
  .modal-checkrow label{ display:flex; align-items:center; gap:6px; cursor:pointer; }
  .modal-foot{
    display:flex; justify-content:flex-end; gap:8px; padding:12px 18px;
    border-top:1px solid var(--line);
  }
  .ghost-btn{
    font-family:inherit; font-size:12.5px; font-weight:600; cursor:pointer; border-radius:6px; padding:7px 14px;
    border:1px solid var(--line); background:none; color:var(--sub);
  }
  .save-btn{
    font-family:inherit; font-size:12.5px; font-weight:700; cursor:pointer; border-radius:6px; padding:7px 14px;
    border:none; background:var(--navy); color:#fff;
  }
  .save-btn:hover{ background:var(--navy-deep); }

  /* ===== 작업 영역 ===== */
  .workspace{ display:flex; flex:1; min-height:0; }
  .workspace.layout-row{ flex-direction:row; }
  .workspace.layout-col{ flex-direction:column; }

  .panel{ display:flex; flex-direction:column; min-width:0; min-height:0; background:var(--panel); }
  .layout-row .panel.chat{ flex:0 0 40%; border-right:1px solid var(--line); }
  .layout-row .panel.explorer{ flex:1; }
  .layout-col .panel.chat{ flex:0 0 auto; min-height:300px; max-height:42%; border-bottom:1px solid var(--line); }
  .layout-col .panel.explorer{ flex:1; }

  .panel-head{
    display:flex; align-items:center; gap:8px; height:38px; padding:0 14px;
    border-bottom:1px solid var(--line); font-size:12.5px; font-weight:700; color:var(--navy);
    flex-shrink:0; background:#f4f5f8;
  }
  .panel-head .dot{ width:6px; height:6px; border-radius:50%; background:var(--gold); }
  .autoref-toggle{
    display:flex; align-items:center; gap:6px;
    font-family:inherit; font-size:11.5px; font-weight:700; cursor:pointer;
    border:1px solid var(--line); border-radius:20px; padding:4px 10px 4px 8px;
    background:#eef0f3; color:#8a93a3;
  }
  .autoref-toggle .dot{ width:7px; height:7px; border-radius:50%; background:#b4bac4; flex-shrink:0; }
  .autoref-toggle.is-on{ background:var(--navy); color:#fff; border-color:var(--navy); }
  .autoref-toggle.is-on .dot{ background:var(--gold); box-shadow:0 0 4px rgba(200,162,68,0.7); }

  /* ===== AI 채팅 패널 ===== */
  .chat-body{ flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:12px; }
  .msg{ max-width:82%; padding:10px 13px; border-radius:10px; font-size:13.5px; line-height:1.55; }
  .msg.ai{ background:#f0f2f6; color:var(--ink); align-self:flex-start; border-top-left-radius:2px; }
  .msg.me{ background:var(--navy); color:#fff; align-self:flex-end; border-top-right-radius:2px; }
  .chat-input{ display:flex; gap:8px; padding:12px; border-top:1px solid var(--line); flex-shrink:0; }
  .chat-input input{
    flex:1; border:1px solid var(--line); border-radius:8px; padding:9px 12px;
    font-family:inherit; font-size:13.5px;
  }
  .chat-input button{
    background:var(--navy); color:#fff; border:none; border-radius:8px;
    padding:9px 16px; font-family:inherit; font-size:13px; font-weight:600; cursor:pointer;
  }
  .chat-input button:hover{ background:var(--navy-deep); }

  /* ===== 파일 드래그&드롭 첨부 ===== */
  .chat-body.drag-over{ background:#eef3fb; outline:2px dashed var(--gold); outline-offset:-6px; }
  .attach-bar{ display:flex; flex-wrap:wrap; gap:6px; padding:8px 12px 0 12px; }
  .attach-chip{
    display:flex; align-items:center; gap:6px; background:#f0f2f6; border:1px solid var(--line);
    border-radius:14px; padding:4px 8px; font-size:11.5px; color:var(--ink);
  }
  .attach-chip .x{ cursor:pointer; color:var(--sub); font-weight:700; padding:0 2px; }
  .attach-chip .x:hover{ color:#a83232; }

  /* ===== 탐색기 / 편집기 패널 ===== */
  .breadcrumb{ display:flex; align-items:center; gap:6px; font-size:12.5px; color:var(--sub); }
  .breadcrumb b{ color:var(--navy); }
  .breadcrumb .sep{ color:#c3c8d1; }
  .explorer-body{ flex:1; overflow-y:auto; padding:6px; }
  .folder-row, .file-row{
    display:flex; align-items:center; gap:10px; padding:9px 12px; border-radius:6px;
    font-size:13.5px; cursor:pointer; color:var(--ink);
  }
  .folder-row:hover, .file-row:hover{ background:#f0f2f6; }
  .folder-row .icon{ color:var(--gold); font-size:15px; }
  .file-row .icon{ color:#8a93a3; font-size:15px; }
  .file-row .meta{ margin-left:auto; font-size:11.5px; color:var(--sub); }
  .file-row .file-check, .folder-row .file-check{ flex-shrink:0; cursor:pointer; accent-color:var(--gold); width:14px; height:14px; }
  .file-row.is-selected, .folder-row.is-selected{ background:#fbf4e3; }
  .selection-inline{
    display:flex; align-items:center; gap:6px; font-size:11.5px; color:var(--navy);
    background:#fbf4e3; border:1px solid var(--gold); border-radius:20px; padding:4px 8px;
  }
  .selection-inline button{
    font-family:inherit; font-size:11px; font-weight:700; cursor:pointer; border-radius:12px; padding:3px 8px;
    border:1px solid var(--navy); background:var(--navy); color:#fff;
  }
  .selection-inline button.ghost{ background:none; color:var(--sub); border-color:var(--line); }

  /* ===== 탐색기 상태 표시 ===== */
  .explorer-status{ padding:16px 14px; font-size:13px; color:var(--sub); }
  .explorer-status.is-error{ color:#a83232; }
  .explorer-empty{ padding:16px 14px; font-size:12.5px; color:var(--sub); }

  /* ===== 편집기(실제 iframe) ===== */
  .editor-toolbar{
    display:flex; align-items:center; gap:10px; height:40px; padding:0 12px;
    border-bottom:1px solid var(--line); flex-shrink:0; background:#f9fafb;
  }
  .editor-filename{ font-size:12.5px; color:var(--sub); }
  .editor-frame{ flex:1; width:100%; border:none; background:#fff; }
  .back-btn{
    background:none; border:1px solid var(--line); border-radius:6px; padding:5px 11px;
    font-size:12px; color:var(--sub); cursor:pointer; font-family:inherit;
  }
  .back-btn:hover{ border-color:var(--navy); color:var(--navy); }

  @media (max-width: 720px){
    .layout-row .panel.chat{ flex:0 0 45%; }
  }
</style>
</head>
<body>

  <div class="topbar">
    <div class="brand">NX 작업실</div>
    <div class="case-select">
      <select id="customerSelect">
        <option value="">고객 불러오는 중…</option>
      </select>
    </div>
    <div class="case-path" id="casePath">불러오는 중…</div>
    <div class="spacer"></div>
    <div class="layout-toggle" role="group" aria-label="레이아웃 전환">
      <button id="btnRow" title="좌우 배치" aria-label="좌우 배치">⬓</button>
      <button id="btnCol" title="상하 배치" aria-label="상하 배치">⬒</button>
    </div>
    <button id="btnOpenSettings" class="settings-btn" title="AI 설정">⚙ AI 설정</button>
  </div>

  <div class="modal-overlay" id="settingsOverlay" style="display:none;">
    <div class="modal-panel">
      <div class="modal-head">
        <span>AI 설정</span>
        <span class="modal-close" id="btnCloseSettings" title="닫기">✕</span>
      </div>
      <div class="modal-body">

        <label class="modal-label">모델</label>
        <select id="settingsModel">
          <option value="claude-sonnet-5">Claude Sonnet 5</option>
          <option value="claude-opus-4-8">Claude Opus 4.8</option>
          <option value="claude-haiku-4-5-20251001">Claude Haiku 4.5</option>
          <option value="claude-fable-5">Claude Fable 5</option>
          <option value="gemini-3.1-pro-preview">Gemini 3.1 Pro (Preview)</option>
          <option value="gemini-3.5-flash">Gemini 3.5 Flash</option>
          <option value="gemini-3.1-flash-lite">Gemini 3.1 Flash-Lite</option>
        </select>

        <label class="modal-label">사고 강도</label>
        <select id="settingsEffort">
          <option value="low">낮음 (빠름)</option>
          <option value="medium" selected>보통</option>
          <option value="high">높음 (신중하게, 느림)</option>
        </select>

        <label class="modal-label">온도 (temperature, 비워두면 모델 기본값)</label>
        <input type="number" id="settingsTemperature" min="0" max="1" step="0.1" placeholder="예: 0.7">
        <div class="modal-hint">※ 온도는 Claude Haiku(낮음 강도일 때만) 또는 Gemini 계열에서만 실제로 적용됩니다. Sonnet/Opus/Fable은 사고 강도(adaptive thinking)를 쓰기 때문에 온도 값을 무시합니다.</div>

        <label class="modal-label">최대 출력 토큰 (비워두면 강도별 기본값: 낮음 1,536 / 보통 6,000 / 높음 16,000)</label>
        <input type="number" id="settingsMaxTokens" min="256" max="64000" step="500" placeholder="예: 8000">

        <div class="modal-checkrow">
          <label><input type="checkbox" id="settingsWebSearch"> 웹서치 사용</label>
          <label><input type="checkbox" id="settingsWebFetch"> 웹페이지 가져오기 사용</label>
          <label><input type="checkbox" id="settingsCodeExec"> 코드실행 사용</label>
        </div>

        <div class="modal-checkrow">
          <label><input type="checkbox" id="settingsAdvisor"> 어드바이저(자문 AI) 사용</label>
        </div>
        <div id="advisorModelRow" style="display:none;">
          <label class="modal-label">어드바이저 모델</label>
          <select id="settingsAdvisorModel">
            <option value="claude-opus-4-8">Claude Opus 4.8</option>
            <option value="claude-sonnet-5">Claude Sonnet 5</option>
          </select>
        </div>

        <label class="modal-label">시스템 프롬프트 (비워두면 기본 프롬프트 사용)</label>
        <textarea id="settingsSystemPrompt" rows="3" placeholder="예: 너는 이음세무컨설팅의 개인 업무 보조 AI다..."></textarea>

      </div>
      <div class="modal-foot">
        <button id="btnResetSettings" class="ghost-btn">기본값으로</button>
        <button id="btnSaveSettings" class="save-btn">저장</button>
      </div>
    </div>
  </div>

  <div class="workspace" id="workspace">
    <div class="panel chat">
      <div class="panel-head">
        <span class="dot"></span> AI 채팅
        <div class="spacer"></div>
        <div id="selectionInline" class="selection-inline" style="display:none;">
          <span id="selectionCountText"></span>
          <button type="button" id="btnAttachSelected">첨부</button>
          <button type="button" id="btnClearSelected" class="ghost">취소</button>
        </div>
        <button type="button" id="btnAutoRef" class="autoref-toggle" title="자동참조 모드: AI가 알아서 폴더/파일을 읽을지, 명시적으로 요청했을 때만 읽을지"><span class="dot"></span>자동참조 OFF</button>
      </div>
      <div class="chat-body" id="chatBody">
        <div class="msg ai">안녕하세요. 우측 탐색기에서 보고 계신 위치나 열어두신 파일에 대해 물어보시면 답변해드립니다. (자동참조 토글로 "알아서 읽기" 여부를 바꿀 수 있어요, 또는 우측 파일을 여기로 끌어다 놓으셔도 됩니다)</div>
      </div>
      <div class="attach-bar" id="attachBar" style="display:none;"></div>
      <div class="chat-input">
        <input type="text" id="chatInputEl" placeholder="메시지를 입력하세요… (파일을 여기로 끌어다 놓을 수 있어요)" aria-label="메시지 입력">
        <button type="button" id="btnChatSend">보내기</button>
      </div>
    </div>

    <div class="panel explorer">
      <div class="panel-head">
        <span class="dot"></span>
        <div class="breadcrumb" id="breadcrumb">&nbsp;</div>
      </div>

      <div id="explorerView">
        <div class="explorer-body" id="explorerBody">
          <div class="explorer-status">불러오는 중…</div>
        </div>
      </div>

      <div id="editorView" style="display:none; flex:1; flex-direction:column; min-height:0;">
        <div class="editor-toolbar">
          <button class="back-btn" id="btnBack">‹ 탐색기로 돌아가기</button>
          <span class="editor-filename" id="editorFilename"></span>
        </div>
        <iframe id="editorFrame" class="editor-frame" title="문서 편집기"></iframe>
      </div>
    </div>
  </div>

<script>
  // ============================================================
  // 설정 — 아래 두 값만 채우면 실제 데이터로 동작합니다.
  // ============================================================
  const GAS_URL = 'https://script.google.com/macros/s/AKfycbz9pam82WMSMKHYo6-6EtEguMbpZ0AaqHirVzwcW6ZFRsdq4WGluvhpPkYUoTE2l_bm/exec';
  const REPORT_WRITER_URL = 'https://desk.netax.kr/report-writer/'; // 실제 report-writer 경로로 교체

  // ============================================================
  // 레이아웃 전환 (기존 그대로)
  // ============================================================
  const workspace = document.getElementById('workspace');
  const btnRow = document.getElementById('btnRow');
  const btnCol = document.getElementById('btnCol');
  const LAYOUT_KEY = 'nx_workspace_layout';

  function applyLayout(mode){
    workspace.classList.toggle('layout-row', mode === 'row');
    workspace.classList.toggle('layout-col', mode === 'col');
    btnRow.classList.toggle('active', mode === 'row');
    btnCol.classList.toggle('active', mode === 'col');
  }
  function detectDefault(){
    return window.innerWidth >= window.innerHeight ? 'row' : 'col';
  }
  function initLayout(){
    const saved = localStorage.getItem(LAYOUT_KEY);
    applyLayout(saved || detectDefault());
  }
  btnRow.addEventListener('click', () => { applyLayout('row'); localStorage.setItem(LAYOUT_KEY, 'row'); });
  btnCol.addEventListener('click', () => { applyLayout('col'); localStorage.setItem(LAYOUT_KEY, 'col'); });
  initLayout();

  // ============================================================
  // GAS 호출 (listFolder)
  // ============================================================
  async function callGas(action, payload){
    const res = await fetch(GAS_URL, {
      method: 'POST',
      // GAS 웹앱의 CORS preflight 회피를 위해 text/plain으로 보냄 (서버에서 JSON.parse로 처리)
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(Object.assign({ action }, payload))
    });
    if (!res.ok) throw new Error('네트워크 오류 (status ' + res.status + ')');
    return res.json();
  }

  async function listFolder(path){
    const data = await callGas('listFolder', { path });
    if (data.error) throw new Error(data.error);
    return data; // { path, folderId, folders:[{id,name}], files:[{id,name,mimeType,modifiedDate,url}] }
  }

  // ============================================================
  // 상태
  // ============================================================
  const customerSelect = document.getElementById('customerSelect');
  const casePathEl = document.getElementById('casePath');
  const breadcrumbEl = document.getElementById('breadcrumb');
  const explorerBody = document.getElementById('explorerBody');
  const explorerView = document.getElementById('explorerView');
  const editorView = document.getElementById('editorView');
  const editorFrame = document.getElementById('editorFrame');
  const editorFilename = document.getElementById('editorFilename');

  // explorerPath: [고객명, 사건명, ...하위 폴더들] — 항상 최소 2단계(고객/사건) 유지
  let explorerPath = [];
  // 체크박스로 선택된 항목들 (파일이든 폴더든) — 여러 개 골라서 한 번에 채팅에 첨부하기 위함
  // key: id, value: { id, name, type:'file'|'folder', mimeType?, path? }
  let selectedItems = new Map();
  let lastRenderedFiles = []; // 현재 화면에 그려진 파일 목록 (id로 다시 찾기 위함)
  const selectionInline = document.getElementById('selectionInline');
  const selectionCountText = document.getElementById('selectionCountText');

  function setSelectOptions(selectEl, names, placeholderIfEmpty){
    selectEl.innerHTML = '';
    if (!names.length){
      const opt = document.createElement('option');
      opt.value = '';
      opt.textContent = placeholderIfEmpty;
      selectEl.appendChild(opt);
      return;
    }
    names.forEach(name=>{
      const opt = document.createElement('option');
      opt.value = name;
      opt.textContent = name;
      selectEl.appendChild(opt);
    });
  }

  function updateCasePath(){
    casePathEl.textContent = explorerPath.length ? explorerPath.join(' / ') : '고객을 선택하세요';
  }

  function renderBreadcrumb(){
    breadcrumbEl.innerHTML = '';
    explorerPath.forEach((seg, i)=>{
      const b = document.createElement('b');
      b.textContent = seg;
      if (i < explorerPath.length - 1){
        b.style.cursor = 'pointer';
        b.addEventListener('click', ()=> navigateTo(explorerPath.slice(0, i + 1)));
      }
      breadcrumbEl.appendChild(b);
      if (i < explorerPath.length - 1){
        const sep = document.createElement('span');
        sep.className = 'sep';
        sep.textContent = '›';
        breadcrumbEl.appendChild(sep);
      }
    });
  }

  function showExplorerStatus(text, isError){
    explorerBody.innerHTML = '';
    const div = document.createElement('div');
    div.className = 'explorer-status' + (isError ? ' is-error' : '');
    div.textContent = text;
    explorerBody.appendChild(div);
  }

  function iconForFile(mimeType){
    if (mimeType && mimeType.indexOf('folder') !== -1) return '📁';
    if (mimeType && mimeType.indexOf('image/') === 0) return '🖼️';
    if (mimeType === 'application/pdf') return '📕';
    return '📄';
  }

  function renderSelectionBar(){
    if (!selectedItems.size){
      selectionInline.style.display = 'none';
      btnAutoRef.style.display = '';
      return;
    }
    selectionCountText.textContent = selectedItems.size + '개 선택됨';
    selectionInline.style.display = 'flex';
    btnAutoRef.style.display = 'none'; // 자동참조 버튼 자리를 선택 상태로 대체 (레이아웃이 안 밀리게)
  }

  // 체크박스 상태와 선택바를 다시 그림 (파일 목록 자체를 새로 그리지 않고 표시만 갱신)
  function refreshSelectionUi(){
    explorerBody.querySelectorAll('.file-row, .folder-row[data-item-id]').forEach(row=>{
      const id = row.dataset.itemId;
      const checked = selectedItems.has(id);
      row.classList.toggle('is-selected', checked);
      const cb = row.querySelector('.file-check');
      if (cb) cb.checked = checked;
    });
    renderSelectionBar();
  }

  // 선택된 파일/폴더를 한 번에 채팅 첨부 목록으로 보냄
  function attachSelectedFiles(){
    selectedItems.forEach(item => addAttachment(item));
    selectedItems.clear();
    refreshSelectionUi();
  }

  function renderExplorer(data){
    explorerPath = data.path;
    renderBreadcrumb();
    updateCasePath();
    explorerBody.innerHTML = '';
    selectedItems.clear(); // 새 폴더로 이동하면 이전 화면의 선택은 의미 없으므로 초기화
    lastRenderedFiles = data.files;

    // 최상위(고객 폴더) 밑으로 내려온 상태에서만 ".." 상위 폴더 이동 허용
    if (explorerPath.length > 1){
      const up = document.createElement('div');
      up.className = 'folder-row';
      up.innerHTML = '<span class="icon">📁</span> .. (상위 폴더)';
      up.addEventListener('click', ()=> navigateTo(explorerPath.slice(0, -1)));
      explorerBody.appendChild(up);
    }

    data.folders.forEach(f=>{
      const folderPath = explorerPath.concat([f.name]);
      const row = document.createElement('div');
      row.className = 'folder-row';
      row.draggable = true;
      row.dataset.itemId = f.id;
      row.innerHTML = '<input type="checkbox" class="file-check" title="여러 개 선택해서 한 번에 첨부하려면 체크하세요">'
        + '<span class="icon">📁</span> ' + escapeHtml(f.name);

      row.addEventListener('click', ()=> navigateTo(folderPath));

      const checkbox = row.querySelector('.file-check');
      checkbox.addEventListener('click', (e)=>{ e.stopPropagation(); }); // 체크박스 클릭이 폴더 진입으로 이어지지 않게
      checkbox.addEventListener('change', ()=>{
        if (checkbox.checked) selectedItems.set(f.id, { id: f.id, name: f.name, type: 'folder', path: folderPath });
        else selectedItems.delete(f.id);
        refreshSelectionUi();
      });

      row.addEventListener('dragstart', (e)=>{
        const itemsToDrag = (selectedItems.has(f.id) && selectedItems.size > 1)
          ? Array.from(selectedItems.values())
          : [{ id: f.id, name: f.name, type: 'folder', path: folderPath }];
        e.dataTransfer.setData('application/json', JSON.stringify(itemsToDrag));
        e.dataTransfer.effectAllowed = 'copy';
      });

      explorerBody.appendChild(row);
    });

    data.files.forEach(f=>{
      const row = document.createElement('div');
      row.className = 'file-row';
      row.draggable = true;
      row.dataset.itemId = f.id;
      row.innerHTML = '<input type="checkbox" class="file-check" title="여러 개 선택해서 한 번에 첨부하려면 체크하세요">'
        + '<span class="icon">' + iconForFile(f.mimeType) + '</span> '
        + escapeHtml(f.name) + '<span class="meta">' + escapeHtml(f.modifiedDate || '') + '</span>';

      row.addEventListener('click', ()=> openEditor(f));

      const checkbox = row.querySelector('.file-check');
      checkbox.addEventListener('click', (e)=>{
        e.stopPropagation(); // 체크박스 클릭이 행 클릭(편집기 열기)으로 이어지지 않게
      });
      checkbox.addEventListener('change', ()=>{
        if (checkbox.checked) selectedItems.set(f.id, { id: f.id, name: f.name, type: 'file', mimeType: f.mimeType });
        else selectedItems.delete(f.id);
        refreshSelectionUi();
      });

      row.addEventListener('dragstart', (e)=>{
        // 지금 끄는 행이 "선택된 여러 항목" 중 하나면 선택된 항목 전부를, 아니면 이 파일 하나만 실어보냄
        const itemsToDrag = (selectedItems.has(f.id) && selectedItems.size > 1)
          ? Array.from(selectedItems.values())
          : [{ id: f.id, name: f.name, type: 'file', mimeType: f.mimeType }];
        e.dataTransfer.setData('application/json', JSON.stringify(itemsToDrag));
        e.dataTransfer.effectAllowed = 'copy';
      });

      explorerBody.appendChild(row);
    });

    if (!data.folders.length && !data.files.length){
      const empty = document.createElement('div');
      empty.className = 'explorer-empty';
      empty.textContent = '이 폴더는 비어 있습니다.';
      explorerBody.appendChild(empty);
    }

    renderSelectionBar(); // 폴더 이동으로 선택이 초기화됐으니 선택바도 숨김 처리
  }

  function escapeHtml(s){
    return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  async function navigateTo(path){
    showExplorerStatus('불러오는 중…');
    try{
      const data = await listFolder(path);
      renderExplorer(data);
    }catch(err){
      showExplorerStatus('폴더를 불러오지 못했습니다: ' + err.message, true);
    }
  }

  // 지금 편집기에 열려 있는 파일 (없으면 null) — 채팅으로 넘길 "현재 화면 상태" 컨텍스트에 사용
  let currentOpenFile = null;

  // 텍스트 계열(우리 렌더러로 열 대상)인지 판별 — 그 외(이미지/PDF/기타)는 구글드라이브 자체 미리보기로 보냄
  function isTextRenderable(mimeType, name){
    if (mimeType === 'application/vnd.google-apps.document') return true;
    if (mimeType && mimeType.indexOf('text/') === 0) return true;
    if (/\.(md|txt|html?|htm)$/i.test(name || '')) return true;
    return false;
  }

  function openEditor(file){
    explorerView.style.display = 'none';
    editorView.style.display = 'flex';
    editorFilename.textContent = file.name;
    currentOpenFile = { id: file.id, name: file.name };

    if (isTextRenderable(file.mimeType, file.name)){
      editorFrame.src = REPORT_WRITER_URL + '?fileId=' + encodeURIComponent(file.id);
    } else {
      // 이미지・PDF・기타 파일: 구글드라이브 자체 미리보기 사용 (별도 뷰어를 만들 필요 없음)
      editorFrame.src = 'https://drive.google.com/file/d/' + encodeURIComponent(file.id) + '/preview';
    }
  }

  document.getElementById('btnBack').addEventListener('click', ()=>{
    editorFrame.src = 'about:blank';
    editorView.style.display = 'none';
    explorerView.style.display = 'block';
    currentOpenFile = null;
  });

  // ============================================================
  // 고객/사건 선택 로딩
  // ============================================================
  async function loadCustomers(){
    setSelectOptions(customerSelect, [], '고객 불러오는 중…');
    try{
      const data = await listFolder([]);
      const names = data.folders.map(f => f.name);
      setSelectOptions(customerSelect, names, '고객 폴더 없음');
      if (names.length){
        customerSelect.value = names[0];
        await navigateTo([names[0]]);
      } else {
        showExplorerStatus('고객 폴더가 없습니다.');
        updateCasePath();
      }
    }catch(err){
      setSelectOptions(customerSelect, [], '불러오기 실패');
      showExplorerStatus('고객 목록을 불러오지 못했습니다: ' + err.message, true);
    }
  }

  customerSelect.addEventListener('change', ()=>{
    if (customerSelect.value) navigateTo([customerSelect.value]);
  });

  loadCustomers();

  // ============================================================
  // 자동참조 토글 (ON: AI가 알아서 판단해 폴더/파일을 읽음 / OFF: 명시적으로 요청했을 때만)
  // ============================================================
  const AUTOREF_KEY = 'nx_autoref_mode';
  const btnAutoRef = document.getElementById('btnAutoRef');
  let autoRefMode = localStorage.getItem(AUTOREF_KEY) === '1';

  function renderAutoRefButton(){
    btnAutoRef.innerHTML = '<span class="dot"></span>자동참조 ' + (autoRefMode ? 'ON' : 'OFF');
    btnAutoRef.classList.toggle('is-on', autoRefMode);
  }
  btnAutoRef.addEventListener('click', ()=>{
    autoRefMode = !autoRefMode;
    localStorage.setItem(AUTOREF_KEY, autoRefMode ? '1' : '0');
    renderAutoRefButton();
  });
  renderAutoRefButton();

  document.getElementById('btnAttachSelected').addEventListener('click', attachSelectedFiles);
  document.getElementById('btnClearSelected').addEventListener('click', ()=>{
    selectedItems.clear();
    refreshSelectionUi();
  });

  // ============================================================
  // AI 설정 (모델/강도/도구 등 — 예전 NX Assistant 화면에 있던 설정들을 여기로 이전)
  // ============================================================
  const AI_SETTINGS_KEY = 'nx_ai_settings';
  const DEFAULT_AI_SETTINGS = {
    model: 'claude-sonnet-5',
    effort: 'medium',
    temperature: null,          // null이면 요청에 아예 안 실어서 모델 기본값 사용
    maxTokens: null,            // null이면 강도(effort)별 기본 상한 사용
    enableWebSearch: false,
    enableWebFetch: false,
    enableCodeExecution: false,
    enableAdvisor: false,
    advisorModel: 'claude-opus-4-8',
    systemPrompt: ''            // 비어있으면 GAS의 DEFAULT_SYSTEM_PROMPT 사용
  };

  function loadAiSettings(){
    try{
      const raw = localStorage.getItem(AI_SETTINGS_KEY);
      if (raw) return Object.assign({}, DEFAULT_AI_SETTINGS, JSON.parse(raw));
    }catch(err){ console.warn('AI 설정 로드 실패, 기본값 사용', err); }
    return Object.assign({}, DEFAULT_AI_SETTINGS);
  }

  let aiSettings = loadAiSettings();

  const settingsOverlay = document.getElementById('settingsOverlay');
  const settingsModel = document.getElementById('settingsModel');
  const settingsEffort = document.getElementById('settingsEffort');
  const settingsTemperature = document.getElementById('settingsTemperature');
  const settingsMaxTokens = document.getElementById('settingsMaxTokens');
  const settingsWebSearch = document.getElementById('settingsWebSearch');
  const settingsWebFetch = document.getElementById('settingsWebFetch');
  const settingsCodeExec = document.getElementById('settingsCodeExec');
  const settingsAdvisor = document.getElementById('settingsAdvisor');
  const advisorModelRow = document.getElementById('advisorModelRow');
  const settingsAdvisorModel = document.getElementById('settingsAdvisorModel');
  const settingsSystemPrompt = document.getElementById('settingsSystemPrompt');

  function populateSettingsForm(s){
    settingsModel.value = s.model;
    settingsEffort.value = s.effort;
    settingsTemperature.value = (s.temperature === null || s.temperature === undefined) ? '' : s.temperature;
    settingsMaxTokens.value = (s.maxTokens === null || s.maxTokens === undefined) ? '' : s.maxTokens;
    settingsWebSearch.checked = !!s.enableWebSearch;
    settingsWebFetch.checked = !!s.enableWebFetch;
    settingsCodeExec.checked = !!s.enableCodeExecution;
    settingsAdvisor.checked = !!s.enableAdvisor;
    settingsAdvisorModel.value = s.advisorModel;
    advisorModelRow.style.display = s.enableAdvisor ? 'block' : 'none';
    settingsSystemPrompt.value = s.systemPrompt || '';
  }

  function readSettingsForm(){
    const tempRaw = settingsTemperature.value.trim();
    const maxTokRaw = settingsMaxTokens.value.trim();
    return {
      model: settingsModel.value,
      effort: settingsEffort.value,
      temperature: tempRaw === '' ? null : Math.max(0, Math.min(1, Number(tempRaw))),
      maxTokens: maxTokRaw === '' ? null : Math.max(256, Math.min(64000, Math.floor(Number(maxTokRaw)))),
      enableWebSearch: settingsWebSearch.checked,
      enableWebFetch: settingsWebFetch.checked,
      enableCodeExecution: settingsCodeExec.checked,
      enableAdvisor: settingsAdvisor.checked,
      advisorModel: settingsAdvisorModel.value,
      systemPrompt: settingsSystemPrompt.value.trim()
    };
  }

  function openSettingsModal(){
    populateSettingsForm(aiSettings);
    settingsOverlay.style.display = 'flex';
  }
  function closeSettingsModal(){
    settingsOverlay.style.display = 'none';
  }

  document.getElementById('btnOpenSettings').addEventListener('click', openSettingsModal);
  document.getElementById('btnCloseSettings').addEventListener('click', closeSettingsModal);
  settingsOverlay.addEventListener('click', (e)=>{
    if (e.target === settingsOverlay) closeSettingsModal(); // 바깥(어두운 영역) 클릭 시 닫기
  });
  settingsAdvisor.addEventListener('change', ()=>{
    advisorModelRow.style.display = settingsAdvisor.checked ? 'block' : 'none';
  });
  document.getElementById('btnResetSettings').addEventListener('click', ()=>{
    populateSettingsForm(DEFAULT_AI_SETTINGS);
  });
  document.getElementById('btnSaveSettings').addEventListener('click', ()=>{
    aiSettings = readSettingsForm();
    localStorage.setItem(AI_SETTINGS_KEY, JSON.stringify(aiSettings));
    closeSettingsModal();
  });

  // 채팅 전송 시 GAS로 실어보낼 AI 설정 payload 조립 (값이 기본값/공백이면 아예 안 실어서 서버 기본값이 적용되게 함)
  function buildAiSettingsPayload(){
    const payload = { model: aiSettings.model, effort: aiSettings.effort };
    if (aiSettings.temperature !== null && aiSettings.temperature !== undefined) payload.temperature = aiSettings.temperature;
    if (aiSettings.maxTokens !== null && aiSettings.maxTokens !== undefined) payload.maxTokens = aiSettings.maxTokens;
    if (aiSettings.enableWebSearch) payload.enableWebSearch = true;
    if (aiSettings.enableWebFetch) payload.enableWebFetch = true;
    if (aiSettings.enableCodeExecution) payload.enableCodeExecution = true;
    if (aiSettings.enableAdvisor){
      payload.enableAdvisor = true;
      payload.advisorModel = aiSettings.advisorModel;
    }
    if (aiSettings.systemPrompt) payload.systemPrompt = aiSettings.systemPrompt;
    return payload;
  }

  // ============================================================
  // AI 채팅 — 실제 GAS 연결
  // ============================================================
  const chatBody = document.getElementById('chatBody');
  const chatInputEl = document.getElementById('chatInputEl');
  const btnChatSend = document.getElementById('btnChatSend');
  const attachBar = document.getElementById('attachBar');

  let chatMessages = []; // Claude API 형식: [{role:'user'|'assistant', content:'...'}]
  let pendingAttachments = []; // [{id,name,type:'file'|'folder',mimeType?,path?}] — 채팅에 끌어다 놓거나 첨부한 항목들 (다음 전송에 무조건 반영)

  function renderAttachBar(){
    attachBar.innerHTML = '';
    if (!pendingAttachments.length){
      attachBar.style.display = 'none';
      return;
    }
    attachBar.style.display = 'flex';
    pendingAttachments.forEach(item=>{
      const chip = document.createElement('div');
      chip.className = 'attach-chip';
      const icon = item.type === 'folder' ? '📁' : '📎';
      chip.innerHTML = icon + ' ' + escapeHtml(item.name) + ' <span class="x" title="첨부 취소">✕</span>';
      chip.querySelector('.x').addEventListener('click', ()=>{
        pendingAttachments = pendingAttachments.filter(a => a.id !== item.id);
        renderAttachBar();
      });
      attachBar.appendChild(chip);
    });
  }

  function addAttachment(item){
    if (!item || !item.id) return;
    if (pendingAttachments.find(a => a.id === item.id)) return; // 중복 방지
    pendingAttachments.push({
      id: item.id,
      name: item.name,
      type: item.type === 'folder' ? 'folder' : 'file',
      mimeType: item.mimeType,
      path: item.path // 폴더인 경우에만 있음
    });
    renderAttachBar();
  }

  // 파일탐색기에서 채팅창으로 드래그&드롭
  chatBody.addEventListener('dragover', (e)=>{
    e.preventDefault();
    e.dataTransfer.dropEffect = 'copy';
    chatBody.classList.add('drag-over');
  });
  chatBody.addEventListener('dragleave', ()=>{
    chatBody.classList.remove('drag-over');
  });
  chatBody.addEventListener('drop', (e)=>{
    e.preventDefault();
    chatBody.classList.remove('drag-over');
    const raw = e.dataTransfer.getData('application/json');
    if (!raw) return;
    try{
      const parsed = JSON.parse(raw);
      const list = Array.isArray(parsed) ? parsed : [parsed]; // 항상 배열로 옴 (단일 파일도 1개짜리 배열)
      list.forEach(addAttachment);
    }catch(err){ console.warn('첨부 데이터 파싱 실패', err); }
  });

  function appendBubble(role, text){
    const div = document.createElement('div');
    div.className = 'msg ' + (role === 'user' ? 'me' : 'ai');
    div.textContent = text;
    chatBody.appendChild(div);
    chatBody.scrollTop = chatBody.scrollHeight;
    return div;
  }

  async function sendChatMessage(){
    const text = chatInputEl.value.trim();
    if (!text) return;

    const attachmentsForThisMessage = pendingAttachments.slice();
    const attachNote = attachmentsForThisMessage.length
      ? ' ' + attachmentsForThisMessage.map(a => (a.type === 'folder' ? '📁' : '📎') + a.name).join(', ')
      : '';

    appendBubble('user', text + attachNote);
    chatMessages.push({ role: 'user', content: text });
    chatInputEl.value = '';
    chatInputEl.disabled = true;
    btnChatSend.disabled = true;
    pendingAttachments = [];
    renderAttachBar();

    const thinkingBubble = appendBubble('assistant', '생각 중…');

    try{
      const res = await fetch(GAS_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(Object.assign({
          messages: chatMessages,
          context: {
            currentPath: explorerPath,
            openFile: currentOpenFile,
            attachedItems: attachmentsForThisMessage
          },
          autoRef: autoRefMode
        }, buildAiSettingsPayload()))
      });
      const data = await res.json();
      if (data.error){
        thinkingBubble.textContent = '오류: ' + data.error;
      } else {
        thinkingBubble.textContent = data.reply || '(빈 응답)';
        chatMessages.push({ role: 'assistant', content: data.reply || '' });
      }
    }catch(err){
      thinkingBubble.textContent = '네트워크 오류: ' + (err && err.message ? err.message : err);
    }finally{
      chatInputEl.disabled = false;
      btnChatSend.disabled = false;
      chatInputEl.focus();
    }
  }

  btnChatSend.addEventListener('click', sendChatMessage);
  chatInputEl.addEventListener('keydown', (e)=>{
    if (e.key === 'Enter' && !e.shiftKey){
      e.preventDefault();
      sendChatMessage();
    }
  });
</script>
</body>
</html>
